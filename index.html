<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskEng Pro + Alertas</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a237e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1087/1087815.png">

    <style>
        :root { 
            --primary: #3949ab; 
            --cat-a: #ff5252; --cat-b: #ffd740; --cat-c: #69f0ae; 
            --bg: #ffffff; --card: #f8f9fa; --text: #1a1a1a;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212; --card: #1e1e1e; --text: #e0e0e0;
                --primary: #7986cb;
            }
        }

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding: env(safe-area-inset-top) 15px 20px; color: var(--text); transition: 0.3s; }
        .container { max-width: 500px; margin: auto; }
        
        h2 { text-align: center; color: var(--primary); margin: 20px 0; }

        .btn-notify { 
            background: #ff9800; color: white; border: none; padding: 12px; 
            border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 20px; 
            cursor: pointer; box-shadow: 0 4px 12px rgba(255,152,0,0.3);
        }

        .stats-bar { display: flex; justify-content: space-around; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 15px; }
        .stat-item { text-align: center; font-size: 0.75em; font-weight: bold; }
        .stat-count { display: block; font-size: 1.4em; color: var(--primary); }

        .reminder-box { background: var(--primary); color: white; padding: 18px; border-radius: 18px; margin-bottom: 25px; box-shadow: 0 6px 15px rgba(57,73,171,0.2); }
        .reminder-box label { color: white; font-size: 0.8em; text-transform: uppercase; font-weight: bold; }
        
        .filters { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .filter-chip { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--primary); background: transparent; color: var(--primary); font-size: 0.8em; white-space: nowrap; }
        .filter-chip.active { background: var(--primary); color: white; }

        .input-group { background: var(--card); padding: 20px; border-radius: 18px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        input { background: var(--bg); color: var(--text); padding: 14px; border: 1px solid #444; border-radius: 12px; font-size: 1em; outline: none; }
        
        .btn-add { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 1em; }

        .task-item { padding: 18px; margin-bottom: 12px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; color: #fff; animation: fadeIn 0.3s ease; }
        .cat-a { background: var(--cat-a); } .cat-b { background: var(--cat-b); color: #222; } .cat-c { background: var(--cat-c); color: #222; }
        .btn-del { background: rgba(0,0,0,0.1); border: none; color: inherit; padding: 8px 12px; border-radius: 10px; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 TaskEng Pro</h2>

    <button id="notifBtn" class="btn-notify" onclick="requestNotificationPermission()">🔔 Activar Recordatorios</button>

    <div class="reminder-box">
        <label>Pendiente Rápido (Hoy)</label>
        <div style="display: flex; gap: 8px; margin-top: 8px;">
            <input type="text" id="quickReminder" placeholder="Ej: Llamar equipo..." style="flex:1; border:none;">
            <button onclick="addQuickReminder()" style="border-radius:10px; border:none; padding:0 15px; background: white; color: var(--primary); font-weight: bold;">+</button>
        </div>
        <div id="quickList" style="font-size: 0.9em; margin-top: 12px; line-height: 1.6;"></div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><span id="countA" class="stat-count">0</span> CAT A</div>
        <div class="stat-item"><span id="countB" class="stat-count">0</span> CAT B</div>
        <div class="stat-item"><span id="countC" class="stat-count">0</span> CAT C</div>
    </div>

    <div class="filters">
        <button class="filter-chip active" onclick="filterTasks('all', this)">Todas</button>
        <button class="filter-chip" onclick="filterTasks('A', this)">Urgentes</button>
        <button class="filter-chip" onclick="filterTasks('B', this)">Próximas</button>
        <button class="filter-chip" onclick="filterTasks('C', this)">Con tiempo</button>
    </div>
    
    <div class="input-group">
        <input type="text" id="taskName" placeholder="Materia o Proyecto">
        <input type="date" id="taskDate">
        <button class="btn-add" onclick="addTask()">Añadir a mi Calendario</button>
    </div>

    <div id="taskList"></div>
</div>

<script>
    let currentFilter = 'all';

    // Registro del Service Worker para notificaciones
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => {
            console.log("Service Worker registrado para notificaciones");
        });
    }

    window.onload = () => {
        renderTasks();
        if (Notification.permission === "granted") {
            document.getElementById('notifBtn').style.display = 'none';
        }
    };

    function requestNotificationPermission() {
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                alert("¡Notificaciones configuradas con éxito!");
                document.getElementById('notifBtn').style.display = 'none';
                sendLocalNotification("TaskEng Pro", "Las alertas están listas para tus entregas.");
            }
        });
    }

    function sendLocalNotification(title, msg) {
        if (Notification.permission === "granted") {
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification(title, {
                    body: msg,
                    icon: 'https://cdn-icons-png.flaticon.com/512/1087/1087815.png',
                    badge: 'https://cdn-icons-png.flaticon.com/512/1087/1087815.png'
                });
            });
        }
    }

    function addQuickReminder() {
        const input = document.getElementById('quickReminder');
        if (!input.value) return;
        
        const list = document.getElementById('quickList');
        const item = document.createElement('div');
        item.innerHTML = `• ${input.value}`;
        list.appendChild(item);
        
        // Simulación de recordatorio inteligente (te avisa en 5 segundos de lo que anotaste)
        sendLocalNotification("Recordatorio Guardado", `No olvides: ${input.value}`);
        input.value = "";
    }

    function addTask() {
        const name = document.getElementById('taskName').value;
        const dateVal = document.getElementById('taskDate').value;
        if (!name || !dateVal) return;

        const today = new Date(); today.setHours(0,0,0,0);
        const deadline = new Date(dateVal); deadline.setHours(0,0,0,0);
        const diffInDays = Math.ceil((deadline - today) / (1000 * 60 * 60 * 24));

        let cat = diffInDays <= 2 ? "A" : (diffInDays <= 5 ? "B" : "C");
        const history = JSON.parse(localStorage.getItem('devTasks')) || [];
        history.push({ id: Date.now(), name, days: diffInDays, cat });
        localStorage.setItem('devTasks', JSON.stringify(history));

        if (cat === "A") sendLocalNotification("⚠️ Tarea Urgente", `Has añadido "${name}" para dentro de ${diffInDays} días.`);

        document.getElementById('taskName').value = "";
        renderTasks();
    }

    function deleteTask(id) {
        let history = JSON.parse(localStorage.getItem('devTasks'));
        localStorage.setItem('devTasks', JSON.stringify(history.filter(t => t.id !== id)));
        renderTasks();
    }

    function filterTasks(cat, btn) {
        currentFilter = cat;
        document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = "";
        let history = JSON.parse(localStorage.getItem('devTasks')) || [];

        document.getElementById('countA').innerText = history.filter(t => t.cat === 'A').length;
        document.getElementById('countB').innerText = history.filter(t => t.cat === 'B').length;
        document.getElementById('countC').innerText = history.filter(t => t.cat === 'C').length;

        if (currentFilter !== 'all') history = history.filter(t => t.cat === currentFilter);

        history.sort((a, b) => a.days - b.days).forEach(t => {
            const div = document.createElement('div');
            div.className = `task-item cat-${t.cat.toLowerCase()}`;
            div.innerHTML = `
                <div><strong>${t.name}</strong><small>${t.days < 0 ? 'Vencida' : 'Faltan ' + t.days + ' días'}</small></div>
                <button class="btn-del" onclick="deleteTask(${t.id})">Borrar</button>
            `;
            list.appendChild(div);
        });
    }
</script>
</body>
</html>
