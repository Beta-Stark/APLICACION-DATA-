<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskEng - Enterprise Portal</title>
    <style>
        :root {
            --bg: #0f121d;
            --card: #1e2538;
            --accent: #7986cb;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- PANTALLA DE LOGIN --- */
        #login-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(180deg, #0f121d 0%, #161b2c 100%);
        }

        .login-box {
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .login-box h1 { margin-bottom: 30px; letter-spacing: 2px; color: var(--accent); }

        /* --- DASHBOARD (PANTALLA PRINCIPAL) --- */
        #dashboard { display: none; padding: 20px; min-height: 100vh; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        /* Grid de Módulos estilo la imagen enviada */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .module-card {
            background: var(--card);
            padding: 25px 15px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .module-card:active { transform: scale(0.95); background: var(--accent); }
        .module-card i { font-size: 2.5em; display: block; margin-bottom: 10px; }
        .module-card span { font-weight: bold; font-size: 0.9em; }

        /* --- ESTILOS DE INTERFAZ --- */
        input {
            width: 100%; padding: 15px; margin: 10px 0;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; outline: none;
        }

        .btn-primary {
            width: 100%; padding: 15px; background: var(--accent);
            border: none; border-radius: 12px; color: white;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* --- VISTA DE MÓDULO ABIERTO --- */
        #module-view { display: none; padding: 20px; }
        .back-btn { background: none; border: none; color: var(--accent); font-weight: bold; cursor: pointer; margin-bottom: 20px; }

        .content-card { background: var(--card); padding: 20px; border-radius: 20px; }

        /* Recordatorio estilo imagen anterior */
        .blue-alert { background: var(--accent); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <section id="login-screen">
        <div class="login-box">
            <h1>TASKENG</h1>
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn-primary" onclick="handleLogin()">ENTRAR</button>
            <p style="margin-top: 20px; font-size: 0.7em; opacity: 0.4;">SISTEMA DE GESTIÓN ACADÉMICA</p>
        </div>
    </section>

    <section id="dashboard">
        <div class="header">
            <div>
                <p style="opacity: 0.5; font-size: 0.8em;">Bienvenido,</p>
                <h2 id="display-name">Tester</h2>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:gray;">Salir</button>
        </div>

        <div class="module-grid">
            <div class="module-card" onclick="openModule('reminders')">
                <div style="font-size: 30px;">🔔</div>
                <span>Alertas</span>
            </div>
            <div class="module-card" onclick="openModule('tasks')">
                <div style="font-size: 30px;">📝</div>
                <span>Pendientes</span>
            </div>
            <div class="module-card" onclick="openModule('notes')">
                <div style="font-size: 30px;">📒</div>
                <span>Notas</span>
            </div>
            <div class="module-card" style="opacity: 0.3;">
                <div style="font-size: 30px;">⚙️</div>
                <span>Ajustes</span>
            </div>
        </div>
    </section>

    <section id="module-view">
        <button class="back-btn" onclick="closeModule()">← VOLVER AL PANEL</button>
        
        <div id="module-content"></div>
    </section>

    <script>
        // Configuración simple
        const VALID_USER = "admin";
        const VALID_PASS = "1234";

        function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if (u === VALID_USER && p === VALID_PASS) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('display-name').innerText = u.toUpperCase();
            } else {
                alert("Credenciales incorrectas");
            }
        }

        function openModule(type) {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('module-view').style.display = 'block';
            const container = document.getElementById('module-content');

            if (type === 'reminders') {
                container.innerHTML = `
                    <div class="blue-alert">
                        <h3>Programar Alerta</h3>
                        <input type="text" placeholder="¿Qué recordar?" style="background:white; color:black;">
                        <input type="time" style="background:white; color:black;">
                        <button class="btn-primary" style="background:var(--bg);">GUARDAR</button>
                    </div>
                `;
            } else if (type === 'tasks') {
                container.innerHTML = `
                    <div class="content-card">
                        <h3>Mis Pendientes</h3>
                        <input type="text" placeholder="Nueva tarea...">
                        <button class="btn-primary">AÑADIR</button>
                    </div>
                `;
            } else if (type === 'notes') {
                container.innerHTML = `
                    <div class="content-card">
                        <h3>Bloc de Notas</h3>
                        <textarea id="main-notes" style="width:100%; height:300px; background:transparent; color:white; border:none; outline:none; font-size:1.1em;" oninput="saveNotes()"></textarea>
                    </div>
                `;
                document.getElementById('main-notes').value = localStorage.getItem('notes') || "";
            }
        }

        function closeModule() {
            document.getElementById('module-view').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        function saveNotes() {
            localStorage.setItem('notes', document.getElementById('main-notes').value);
        }
    </script>
</body>
</html>
