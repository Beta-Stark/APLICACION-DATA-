<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskEng Pro - Clean</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #7986cb;
            --text: #f1f5f9;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        /* Selector de perfil tipo "Píldora" */
        .profile-selector {
            background: var(--card);
            padding: 5px;
            border-radius: 50px;
            display: flex;
            gap: 5px;
        }

        .p-btn {
            padding: 8px 15px;
            border-radius: 40px;
            border: none;
            background: none;
            color: #64748b;
            font-weight: bold;
            font-size: 0.7em;
            cursor: pointer;
        }

        .p-btn.active {
            background: var(--primary);
            color: white;
        }

        /* El bloque azul de tu imagen */
        .blue-section {
            background: var(--primary);
            color: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(121, 134, 203, 0.2);
            margin-bottom: 25px;
        }

        .blue-section label { font-size: 0.7em; font-weight: 800; opacity: 0.9; text-transform: uppercase; }

        input, textarea {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
            border: none; background: rgba(255,255,255,0.15); color: white;
            font-size: 1em; box-sizing: border-box; outline: none;
        }

        input::placeholder { color: rgba(255,255,255,0.6); }

        .btn-white {
            background: white; color: var(--primary); border: none;
            padding: 15px; border-radius: 12px; font-weight: 900;
            width: 100%; cursor: pointer; margin-top: 10px;
        }

        /* Bloc de notas estilo tarjeta */
        .notes-section {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
        }

        textarea {
            background: transparent;
            min-height: 150px;
            padding: 0;
            margin: 10px 0 0;
            line-height: 1.5;
            color: #cbd5e1;
            resize: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7em;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; font-size: 1.2em;">TaskEng Pro</h2>
        <div class="profile-selector">
            <button id="btn-T1" class="p-btn active" onclick="switchProfile('Tester_1')">TESTER 1</button>
            <button id="btn-T2" class="p-btn" onclick="switchProfile('Tester_2')">TESTER 2</button>
        </div>
    </div>

    <div class="blue-section">
        <label>Recordatorio con Horario</label>
        <input type="text" id="remText" placeholder="¿Qué quieres recordar?">
        <div style="display: flex; gap: 10px;">
            <input type="time" id="remTime" style="flex: 1;">
            <button class="btn-white" style="flex: 1.2; margin-top: 10px;" onclick="setAlarm()">PROGRAMAR</button>
        </div>
    </div>

    <div class="notes-section">
        <span class="badge" id="profileBadge">PERFIL ACTUAL: TESTER 1</span>
        <label style="display:block; font-size: 0.8em; font-weight: bold; color: var(--primary);">NOTAS RÁPIDAS</label>
        <textarea id="notesArea" placeholder="Escribe tus apuntes aquí..." oninput="autoSave()"></textarea>
    </div>

    <script>
        let currentProfile = "Tester_1";

        window.onload = () => {
            loadProfileData();
        };

        function switchProfile(id) {
            currentProfile = id;
            // UI
            document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + (id == 'Tester_1' ? 'T1' : 'T2')).classList.add('active');
            document.getElementById('profileBadge').innerText = "PERFIL ACTUAL: " + id.replace('_', ' ');
            
            loadProfileData();
        }

        function autoSave() {
            const content = document.getElementById('notesArea').value;
            localStorage.setItem(currentProfile + '_notes', content);
        }

        function loadProfileData() {
            const savedNotes = localStorage.getItem(currentProfile + '_notes') || "";
            document.getElementById('notesArea').value = savedNotes;
        }

        function setAlarm() {
            const txt = document.getElementById('remText').value;
            const time = document.getElementById('remTime').value;
            if(!txt || !time) return;

            // Lógica de notificación (la misma de Android que ya tienes)
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.ready.then(reg => {
                    const now = new Date();
                    const [h, m] = time.split(':');
                    let target = new Date();
                    target.setHours(h, m, 0, 0);
                    if (target <= now) target.setDate(target.getDate() + 1);
                    
                    reg.active.postMessage({
                        type: 'SCHEDULE_REMINDER',
                        text: txt,
                        time: time,
                        delay: target - now
                    });
                });
                alert("Programado para el " + currentProfile);
                document.getElementById('remText').value = "";
            }
        }
    </script>
</body>
</html>
