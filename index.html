<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DATA OS - Versión Final Corregida</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F7EFE2; --surface: #FFFFFF; --header-accent: #2A3A4A;
            --card-cloud: #BBCBBD; --card-vault: #C9A091; --text-main: #2A3A4A;
            --nav-icon: #6366F1; --danger: #EF4444; --clock-icon: #D97706;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; padding-bottom: 80px; }
        
        .system-bar { background: var(--surface); padding: 15px 25px; display: none; justify-content: space-between; align-items: center; border-bottom: 1px solid #E2E8F0; position: sticky; top: 0; z-index: 1000; }
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block !important; }
        #login-screen.active { display: flex !important; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }

        /* ESTILO DE NOTAS E INDICADOR X */
        .mod-card { padding: 20px; border-radius: 28px; margin-bottom: 15px; position: relative; }
        .notes-area { background: var(--card-cloud); }
        .note-item { background: white; padding: 15px; border-radius: 18px; margin-bottom: 10px; position: relative; border: 1px solid rgba(0,0,0,0.05); }
        .note-time { color: var(--clock-icon); font-size: 0.75rem; font-weight: 800; display: block; margin-top: 5px; }
        
        /* LA X DE BORRADO - FORZADA */
        .delete-btn { 
            position: absolute; right: 10px; top: 10px; 
            color: var(--danger) !important; font-weight: 900; 
            font-size: 1.4rem; cursor: pointer; padding: 5px; z-index: 100;
        }

        /* BÓVEDA Y PIN */
        .vault-area { background: var(--card-vault); color: white; }
        .pin-dots { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid #ddd; background: white; }
        .dot.active { background: var(--header-accent); border-color: var(--header-accent); }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 250px; margin: 0 auto; }
        .num-btn { height: 60px; background: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 700; color: var(--text-main); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* NAVEGACIÓN */
        .pwa-nav { background: white; padding: 10px; display: none; justify-content: space-around; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { text-align: center; font-size: 0.7rem; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--nav-icon); font-weight: 800; }

        input, textarea { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin: 10px 0; }
        .btn-main { width: 100%; padding: 15px; background: var(--header-accent); color: white; border: none; border-radius: 12px; font-weight: 800; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="system-bar" id="sys-bar">
        <div style="font-weight:900; color:var(--header-accent)">DATA OS</div>
        <div id="clock">00:00</div>
    </div>

    <div id="login-screen" class="screen active">
        <h1 style="font-size: 2.5rem; font-weight: 900;">DATA OS</h1>
        <input type="text" id="userInput" placeholder="Usuario">
        <input type="password" id="passInput" placeholder="PIN (1234)">
        <button class="btn-main" onclick="handleLogin()">ENTRAR</button>
    </div>

    <div id="dashboard" class="screen">
        <h2 id="welcome-msg" style="margin-bottom:20px;">Hola</h2>
        <div class="mod-card notes-area">
            <h3 style="margin-bottom:10px;">📝 RECORDATORIOS</h3>
            <div id="notes-container"></div>
            <button class="btn-main" onclick="navTo('mod-notes')" style="background:rgba(255,255,255,0.3); color:black; margin-top:10px;">+ Añadir</button>
        </div>
        <div class="mod-card vault-area" onclick="navTo('mod-vault')">
            <h3>🔐 BÓVEDA PRIVADA</h3>
            <p>Toca para acceder a tus secretos</p>
        </div>
    </div>

    <div id="mod-notes" class="screen">
        <h2>Nueva Nota Cloud</h2>
        <textarea id="note-text" placeholder="Escribe aquí..."></textarea>
        <button class="btn-main" id="btnGuardar">GUARDAR EN LA NUBE</button>
    </div>

    <div id="mod-vault" class="screen">
        <div id="vault-auth">
            <h2 style="text-align:center;">PIN DE BÓVEDA</h2>
            <div class="pin-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="numpad" id="numpad"></div>
        </div>
        <div id="vault-content" style="display:none;">
            <h3>Contenido Privado</h3>
            <input type="text" id="v-title" placeholder="Título">
            <input type="text" id="v-secret" placeholder="Secreto">
            <button class="btn-main" onclick="alert('Guardado localmente')">GUARDAR</button>
        </div>
    </div>

    <nav class="pwa-nav" id="pwa-nav">
        <div class="nav-item active" onclick="navTo('dashboard')">🏠<br>Inicio</div>
        <div class="nav-item" onclick="navTo('mod-notes')">📝<br>Notas</div>
        <div class="nav-item" onclick="navTo('mod-vault')">🔐<br>Bóveda</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDlmtpUfYjs33qa9tLE7Fv2C5yszSZEnUw",
            authDomain: "data-os-db30b.firebaseapp.com",
            projectId: "data-os-db30b",
            storageBucket: "data-os-db30b.firebasestorage.app",
            messagingSenderId: "149593183974",
            appId: "1:149593183974:web:e588fbee9a618e21980d27",
            measurementId: "G-VT52P7RX7K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FUNCIÓN BORRAR (GLOBAL) ---
        window.borrarNota = async (id) => {
            if(confirm("¿Borrar recordatorio?")) {
                try {
                    await deleteDoc(doc(db, "recordatorios", id));
                } catch(e) { console.error("Error al borrar"); }
            }
        };

        // --- GUARDAR NOTA ---
        document.getElementById('btnGuardar').onclick = async () => {
            const txt = document.getElementById('note-text').value;
            if(!txt) return;
            await addDoc(collection(db, "recordatorios"), {
                usuario: window.currentUser,
                texto: txt,
                timestamp: serverTimestamp()
            });
            document.getElementById('note-text').value = "";
            navTo('dashboard');
        };

        // --- LEER NOTAS ---
        window.cargarNotas = (user) => {
            const q = query(collection(db, "recordatorios"), where("usuario", "==", user), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const cont = document.getElementById('notes-container');
                cont.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const id = d.id;
                    cont.innerHTML += `
                        <div class="note-item">
                            <span class="delete-btn" onclick="borrarNota('${id}')">✕</span>
                            <p>${data.texto}</p>
                            <small class="note-time">⏰ ${data.timestamp?.toDate().toLocaleString() || '...'}</small>
                        </div>`;
                });
            });
        };
    </script>

    <script>
        let currentPin = "";
        window.currentUser = "";

        function handleLogin() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            if(p === "1234" && u !== "") {
                window.currentUser = u;
                document.getElementById('welcome-msg').innerText = "Hola, " + u;
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('dashboard').classList.add('active');
                document.getElementById('sys-bar').style.display = 'flex';
                document.getElementById('pwa-nav').style.display = 'flex';
                window.cargarNotas(u);
            } else { alert("PIN 1234"); }
        }

        function navTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        }

        // --- LÓGICA BÓVEDA PIN ---
        const numpad = document.getElementById('numpad');
        for(let i=1; i<=9; i++) numpad.innerHTML += `<div class="num-btn" onclick="btnPin('${i}')">${i}</div>`;
        numpad.innerHTML += `<div class="num-btn" onclick="currentPin=''; updateDots()">C</div><div class="num-btn" onclick="btnPin('0')">0</div>`;

        window.btnPin = (n) => {
            if(currentPin.length < 4) {
                currentPin += n;
                updateDots();
                if(currentPin === "1234") {
                    document.getElementById('vault-auth').style.display = 'none';
                    document.getElementById('vault-content').style.display = 'block';
                } else if(currentPin.length === 4) {
                    currentPin = "";
                    setTimeout(updateDots, 300);
                }
            }
        };

        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((d, i) => d.classList.toggle('active', i < currentPin.length));
        }

        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
        }, 1000);
    </script>
</body>
</html>
