<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DATA OS - Enterprise Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --accent: #2563EB;
            --text-main: #0F172A;
            --text-sub: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --danger: #EF4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        .system-bar {
            background: var(--surface); padding: 12px 20px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border); font-size: 0.75rem; font-weight: 800;
        }

        .screen { display: none; padding: 20px; height: 100vh; overflow-y: auto; }
        .screen.active { display: block !important; animation: fadeIn 0.3s ease; }

        /* LOGIN */
        #login-screen { display: none; flex-direction: column; align-items: center; justify-content: center; }
        #login-screen.active { display: flex !important; }
        .login-card { background: var(--surface); padding: 40px; border-radius: 35px; width: 90%; max-width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }

        /* DASHBOARD */
        .grid-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .mod-card { 
            background: var(--surface); padding: 20px; border-radius: 24px; border: 1px solid var(--border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: 0.2s; cursor: pointer;
        }
        .full-card { grid-column: span 2; display: flex; align-items: center; gap: 15px; }

        /* BLOC DE NOTAS */
        .notes-area {
            width: 100%; height: 200px; padding: 15px; border-radius: 20px;
            border: 1px solid var(--border); background: #FFFBEB; /* Tono papel post-it */
            font-size: 1rem; color: #92400E; outline: none; resize: none;
        }

        /* CONTADOR */
        .counter-box { background: var(--text-main); color: white; padding: 15px; border-radius: 20px; text-align: center; }
        .counter-controls { display: flex; justify-content: center; gap: 20px; align-items: center; margin-top: 10px; }
        .btn-c { width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 1.2rem; font-weight: 900; cursor: pointer; }

        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--border); background: #F1F5F9; }
        .btn-main { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 800; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="system-bar" id="sys-bar" style="display:none;">
        <div style="color:var(--success)">● <span id="role-indicator">SISTEMA</span></div>
        <div id="sync-status" style="color:var(--accent); font-size:0.6rem;">SINCRONIZADO</div>
    </div>

    <div id="login-screen" class="screen active">
        <div class="login-card">
            <h1 style="font-size: 2.2rem; font-weight: 900; margin-bottom: 5px;">DATA OS</h1>
            <p style="color: var(--text-sub); margin-bottom: 25px;">Acceso Jerárquico</p>
            
            <input type="text" id="userInput" placeholder="Nombre de Usuario">
            <select id="roleInput">
                <option value="superadmin">Super Admin</option>
                <option value="tempadmin">Admin Temporal</option>
                <option value="cliente">Cliente</option>
            </select>
            <input type="password" id="passInput" placeholder="PIN (1234)">
            
            <button class="btn-main" onclick="login()">INICIAR SESIÓN</button>
        </div>
    </div>

    <div id="dashboard" class="screen">
        <h1 id="welcome-text" style="font-size: 2rem; font-weight: 900; margin-bottom: 20px;">Hola</h1>

        <div class="grid-tools">
            <div class="mod-card full-card" onclick="navTo('mod-notes')">
                <span style="font-size: 1.5rem;">📝</span>
                <div><strong>Bloc de Notas</strong><small style="display:block; color:var(--text-sub);">Borrador rápido personal</small></div>
            </div>

            <div id="error-counter-mod" class="mod-card full-card counter-box" style="display:none;">
                <strong>ERRORES DETECTADOS</strong>
                <div class="counter-controls">
                    <button class="btn-c" onclick="updateCount(-1)">-</button>
                    <span id="err-count" style="font-size: 2rem; font-weight: 900;">0</span>
                    <button class="btn-c" onclick="updateCount(1)">+</button>
                </div>
            </div>

            <div class="mod-card" onclick="navTo('mod-vault')">
                <span>🔐</span><br><strong>Bóveda</strong>
            </div>
            
            <div class="mod-card" onclick="alert('Módulo de Tareas en desarrollo')">
                <span>⏰</span><br><strong>Tareas</strong>
            </div>
        </div>

        <button onclick="location.reload()" style="margin-top:40px; background:none; border:none; color:var(--danger); font-weight:800; width:100%;">SALIR DEL SISTEMA</button>
    </div>

    <div id="mod-notes" class="screen">
        <button onclick="navTo('dashboard')" style="background:none; border:none; color:var(--accent); font-weight:800; margin-bottom:20px;">← GUARDAR Y VOLVER</button>
        <h2 style="margin-bottom: 10px;">Mi Bloc de Notas</h2>
        <p style="color:var(--text-sub); font-size:0.8rem; margin-bottom:20px;">Lo que escribas aquí se guarda automáticamente en este dispositivo.</p>
        
        <textarea id="quick-note" class="notes-area" placeholder="Escribe algo aquí..."></textarea>
        
        <button class="btn-main" style="background:var(--danger); margin-top:20px;" onclick="clearNote()">BORRAR TODO</button>
    </div>

    <div id="mod-vault" class="screen">
        <button onclick="navTo('dashboard')" style="background:none; border:none; color:var(--accent); font-weight:800; margin-bottom:20px;">← VOLVER</button>
        <h2 id="vault-title">Bóveda</h2>
        <div id="vault-content" style="margin-top:20px;"></div>
    </div>

    <script>
        let currentRole = "";
        let errorCount = 0;

        // Cargar nota guardada al iniciar
        window.onload = () => {
            if(localStorage.getItem('user_note')) {
                document.getElementById('quick-note').value = localStorage.getItem('user_note');
            }
        };

        function login() {
            const pass = document.getElementById('passInput').value;
            const user = document.getElementById('userInput').value;
            const role = document.getElementById('roleInput').value;

            if(pass === "1234") {
                currentRole = role;
                document.getElementById('welcome-text').innerText = "Hola, " + user;
                document.getElementById('sys-bar').style.display = 'flex';
                document.getElementById('role-indicator').innerText = role.toUpperCase();
                
                setupPermissions();
                navTo('dashboard');
            } else { alert("PIN Incorrecto"); }
        }

        function setupPermissions() {
            if(currentRole === 'superadmin' || currentRole === 'tempadmin') {
                document.getElementById('error-counter-mod').style.display = 'block';
            }
        }

        function updateCount(val) {
            errorCount += val;
            if(errorCount < 0) errorCount = 0;
            document.getElementById('err-count').innerText = errorCount;
        }

        function navTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Auto-guardado al salir de notas
            if(id === 'dashboard') {
                const noteVal = document.getElementById('quick-note').value;
                localStorage.setItem('user_note', noteVal);
            }
            if(id === 'mod-vault') renderVault();
        }

        function clearNote() {
            if(confirm("¿Borrar toda la nota?")) {
                document.getElementById('quick-note').value = "";
                localStorage.removeItem('user_note');
            }
        }

        function renderVault() {
            const v = document.getElementById('vault-content');
            let html = `<div class="mod-card full-card">📄 Reporte_Mensual.pdf</div>`;
            if(currentRole === 'superadmin') {
                html += `<div class="mod-card full-card" style="border-color:var(--accent)">✏️ EDITAR DOCUMENTOS MAESTROS</div>`;
            }
            v.innerHTML = html;
        }
    </script>
</body>
</html>
