
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DATA OS - Enterprise Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --accent: #2563EB;
            --text-main: #0F172A;
            --text-sub: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --danger: #EF4444;
            --note-bg: #FFFBEB;
            --wa-green: #25D366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        .system-bar {
            background: var(--surface); padding: 12px 20px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border); font-size: 0.75rem; font-weight: 800;
        }

        .screen { display: none; padding: 20px; min-height: 100vh; animation: fadeIn 0.3s ease; }
        .screen.active { display: block !important; }

        /* LOGIN & CARDS */
        .login-card { background: var(--surface); padding: 40px; border-radius: 35px; width: 90%; max-width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; margin: auto; }
        .mod-card { background: var(--surface); padding: 20px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: 0.2s; cursor: pointer; position: relative; margin-bottom: 12px; }
        .full-card { display: flex; align-items: center; gap: 15px; }

        /* PIN PAD */
        .pin-dots { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--border); transition: 0.3s; }
        .dot.active { background: var(--accent); border-color: var(--accent); transform: scale(1.2); }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 280px; margin: 0 auto; }
        .num-btn { height: 65px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); font-size: 1.5rem; font-weight: 600; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .num-btn:active { background: var(--accent); color: white; }

        /* NOTAS */
        .notes-area { width: 100%; height: 100px; padding: 15px; border-radius: 15px; border: 1px solid var(--border); background: #F8FAFC; outline: none; resize: none; font-size: 1rem; }
        .note-item { background: var(--note-bg); padding: 15px; border-radius: 20px; border: 1px solid #FEF3C7; margin-bottom: 10px; }

        /* FORMULARIOS */
        input, select { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--border); background: #F1F5F9; font-size: 1rem; }
        .btn-main { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 800; margin-top: 10px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="system-bar" id="sys-bar" style="display:none;">
        <div style="color:var(--success)">● <span id="role-indicator">SISTEMA</span></div>
        <div id="clock">00:00</div>
    </div>

    <div id="login-screen" class="screen active" style="display: flex; align-items: center;">
        <div class="login-card">
            <h1 style="font-size: 2.2rem; font-weight: 900; color: var(--accent);">DATA OS</h1>
            <p style="color: var(--text-sub); margin-bottom: 25px;">Acceso Enterprise</p>
            <input type="text" id="userInput" placeholder="Usuario">
            <select id="roleInput">
                <option value="superadmin">Super Administrador</option>
                <option value="tempadmin">Administrador Temporal</option>
                <option value="cliente">Usuario Cliente</option>
            </select>
            <input type="password" id="passInput" placeholder="PIN (1234)">
            <button class="btn-main" onclick="handleLogin()">INICIAR SESIÓN</button>
        </div>
    </div>

    <div id="dashboard" class="screen">
        <div style="margin-bottom: 25px;">
            <p id="user-role-label" style="font-size: 0.65rem; font-weight: 900; color: var(--accent); letter-spacing: 2px;"></p>
            <h1 id="welcome-msg" style="font-size: 2.2rem; font-weight: 900;">Hola</h1>
        </div>

        <div id="error-module" style="background:var(--text-main); color:white; padding:20px; border-radius:24px; text-align:center; margin-bottom:20px; display:none;">
            <p style="font-size: 0.7rem; font-weight: 800;">ERRORES DE SESIÓN</p>
            <div style="display:flex; justify-content:center; gap:25px; align-items:center; margin-top:10px;">
                <button onclick="changeCount(-1)" style="width:40px; height:40px; border-radius:50%; border:none; font-weight:900;">-</button>
                <span id="err-display" style="font-size: 2rem; font-weight: 900;">0</span>
                <button onclick="changeCount(1)" style="width:40px; height:40px; border-radius:50%; border:none; font-weight:900;">+</button>
            </div>
        </div>

        <div class="mod-card full-card" onclick="navTo('mod-notes')">
            <span style="font-size: 1.5rem;">📝</span>
            <div><strong>Reportes</strong><small style="display:block; color:var(--text-sub);">Historial y WhatsApp</small></div>
        </div>
        <div class="mod-card full-card" onclick="navTo('mod-vault')">
            <span style="font-size: 1.5rem;">🔐</span>
            <div><strong>Bóveda Segura</strong><small style="display:block; color:var(--text-sub);">Requiere PIN de acceso</small></div>
        </div>
        
        <button onclick="location.reload()" style="margin-top:40px; background:none; border:none; color:var(--danger); font-weight:800; width:100%;">CERRAR SESIÓN</button>
    </div>

    <div id="mod-vault" class="screen">
        <button onclick="navTo('dashboard')" style="background:none; border:none; color:var(--accent); font-weight:800; margin-bottom:20px;">← VOLVER</button>
        
        <div id="vault-auth">
            <h2 style="text-align:center;">Acceso a Bóveda</h2>
            <div class="pin-dots" id="pin-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="numpad">
                <div class="num-btn" onclick="pressPin('1')">1</div><div class="num-btn" onclick="pressPin('2')">2</div><div class="num-btn" onclick="pressPin('3')">3</div>
                <div class="num-btn" onclick="pressPin('4')">4</div><div class="num-btn" onclick="pressPin('5')">5</div><div class="num-btn" onclick="pressPin('6')">6</div>
                <div class="num-btn" onclick="pressPin('7')">7</div><div class="num-btn" onclick="pressPin('8')">8</div><div class="num-btn" onclick="pressPin('9')">9</div>
                <div class="num-btn" style="color:var(--danger); font-size:0.8rem;" onclick="clearPin()">BORRAR</div>
                <div class="num-btn" onclick="pressPin('0')">0</div>
            </div>
        </div>

        <div id="vault-content" style="display:none;">
            <h2>Recursos Protegidos</h2>
            <div id="vault-items" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="mod-notes" class="screen">
        <button onclick="navTo('dashboard')" style="background:none; border:none; color:var(--accent); font-weight:800; margin-bottom:20px;">← VOLVER</button>
        <h2>Reportes Rápidos</h2>
        <textarea id="note-text" class="notes-area" style="margin:15px 0;" placeholder="Escribe aquí..."></textarea>
        <button class="btn-main" onclick="addNote()">GUARDAR</button>
        <div id="notes-container" style="margin-top:20px;"></div>
    </div>

    <script>
        let userData = { name: "", role: "" };
        let notes = JSON.parse(localStorage.getItem('data_notes_pro')) || [];
        let errors = 0;
        let pinInput = "";
        const MASTER_PIN = "1234";

        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
        }, 1000);

        function handleLogin() {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            if (pass === "1234") {
                userData.name = user;
                userData.role = document.getElementById('roleInput').value;
                document.getElementById('welcome-msg').innerText = "Hola, " + user;
                document.getElementById('user-role-label').innerText = userData.role.toUpperCase();
                document.getElementById('sys-bar').style.display = 'flex';
                document.getElementById('role-indicator').innerText = userData.role;
                document.getElementById('error-module').style.display = (userData.role !== 'cliente') ? 'block' : 'none';
                navTo('dashboard');
            } else { alert("Error"); }
        }

        function navTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'mod-vault') resetVault();
            if(id === 'mod-notes') renderNotes();
        }

        /* LÓGICA DE BÓVEDA */
        function pressPin(num) {
            if(pinInput.length < 4) {
                pinInput += num;
                updateDots();
                if(pinInput === MASTER_PIN) {
                    document.getElementById('vault-auth').style.display = 'none';
                    document.getElementById('vault-content').style.display = 'block';
                    renderVault();
                } else if(pinInput.length === 4) {
                    alert("PIN INCORRECTO");
                    clearPin();
                }
            }
        }
        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => dot.classList.toggle('active', i < pinInput.length));
        }
        function clearPin() { pinInput = ""; updateDots(); }
        function resetVault() {
            clearPin();
            document.getElementById('vault-auth').style.display = 'block';
            document.getElementById('vault-content').style.display = 'none';
        }

        function renderVault() {
            const container = document.getElementById('vault-items');
            container.innerHTML = `<div class="mod-card">📄 Manual_Empresa.pdf</div>`;
            if(userData.role === 'superadmin') {
                container.innerHTML += `<div class="mod-card" style="border-color:var(--accent)">🛠️ CONFIG MAESTRA</div>`;
            }
        }

        /* LÓGICA NOTAS */
        function addNote() {
            const txt = document.getElementById('note-text').value;
            if(!txt) return;
            notes.unshift({ id: Date.now(), text: txt, date: new Date().toLocaleString() });
            localStorage.setItem('data_notes_pro', JSON.stringify(notes));
            document.getElementById('note-text').value = "";
            renderNotes();
        }
        function renderNotes() {
            const container = document.getElementById('notes-container');
            container.innerHTML = "";
            notes.forEach(n => {
                const div = document.createElement('div');
                div.className = 'note-item';
                div.innerHTML = `<small>${n.date}</small><p>${n.text}</p>`;
                container.appendChild(div);
            });
        }
        function changeCount(v) { errors += v; document.getElementById('err-display').innerText = errors; }
    </script>
</body>
</html>
