<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA OS - Alarm Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F0F4F8; --accent: #6366F1; --surface: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); padding-bottom: 50px; }
        
        .header { background: var(--surface); padding: 20px; text-align: center; border-bottom: 1px solid #ddd; }
        .screen { display: none; padding: 20px; }
        .screen.active { display: block; }

        /* EL BOTÓN DE LA CAMPANA */
        .btn-bell { 
            background: #E0E7FF; border: 2px solid var(--accent); padding: 20px; 
            border-radius: 20px; text-align: center; cursor: pointer; margin-bottom: 20px;
        }
        .bell-icon { font-size: 2rem; display: block; margin-bottom: 10px; }

        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #eee; position: relative; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ccc; font-size: 1rem; }
        .btn-main { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; }
        
        .badge-alarm { background: #FFA502; color: white; padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: 900; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="header">
            <h1 style="color: var(--accent); font-weight: 900;">DATA OS</h1>
            <p>Ingresa PIN 1234</p>
        </div>
        <input type="password" id="pin" placeholder="****">
        <button class="btn-main" onclick="login()">ENTRAR</button>
    </div>

    <div id="main-screen" class="screen">
        <div class="btn-bell" onclick="requestPermission()">
            <span class="bell-icon">🔔</span>
            <strong>TOCAR AQUÍ PARA ACTIVAR CAMPANA</strong>
            <p style="font-size: 0.8rem; color: var(--accent);">Haz clic para que el teléfono te pregunte</p>
        </div>

        <div class="card">
            <h3>Nueva Alarma</h3>
            <input type="text" id="title" placeholder="¿Qué recordar?">
            <input type="datetime-local" id="time">
            <button class="btn-main" onclick="saveAlarm()">GUARDAR ALARMA</button>
        </div>

        <div id="list"></div>
    </div>

    <script>
        let alarms = JSON.parse(localStorage.getItem('alarms_v3')) || [];
        let audioCtx = null;

        function login() {
            if(document.getElementById('pin').value === "1234") {
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('main-screen').classList.add('active');
            }
        }

        // FUNCIÓN QUE PIDE EL PERMISO REAL
        async function requestPermission() {
            // Inicializar AudioContext (Necesario para sonido en Android)
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            if (!("Notification" in window)) {
                alert("Este navegador no soporta notificaciones.");
            } else {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    alert("¡Campana activada! Ahora recibirás alertas.");
                } else {
                    alert("Permiso denegado. Revisa la configuración de tu navegador.");
                }
            }
        }

        function saveAlarm() {
            const t = document.getElementById('title').value;
            const time = document.getElementById('time').value;
            if(!t || !time) return alert("Completa los datos");

            alarms.push({ id: Date.now(), title: t, time: time, fired: false });
            localStorage.setItem('alarms_v3', JSON.stringify(alarms));
            render();
            document.getElementById('title').value = "";
        }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = "<h2>Mis Alarmas</h2>";
            alarms.forEach(a => {
                list.innerHTML += `
                    <div class="card">
                        <strong>${a.title}</strong><br>
                        <span class="badge-alarm">⏰ ${a.time.replace('T', ' ')}</span>
                        <button onclick="deleteAlarm(${a.id})" style="float:right; border:none; background:none; color:red;">Borrar</button>
                    </div>`;
            });
        }

        // EL RELOJ QUE REVISA CADA SEGUNDO
        setInterval(() => {
            const now = new Date();
            // Formato exacto: YYYY-MM-DDTHH:MM
            const nowStr = now.getFullYear() + "-" + 
                           (now.getMonth()+1).toString().padStart(2,'0') + "-" + 
                           now.getDate().toString().padStart(2,'0') + "T" + 
                           now.getHours().toString().padStart(2,'0') + ":" + 
                           now.getMinutes().toString().padStart(2,'0');

            alarms.forEach(a => {
                if(a.time === nowStr && !a.fired) {
                    a.fired = true;
                    localStorage.setItem('alarms_v3', JSON.stringify(alarms));
                    playAlarm(a.title);
                }
            });
        }, 1000);

        function playAlarm(msg) {
            // 1. Sonido
            if(audioCtx) {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.connect(g); g.connect(audioCtx.destination);
                osc.frequency.value = 523.25; // Do
                osc.start();
                setTimeout(() => osc.stop(), 3000); // 3 segundos de sonido
            }
            
            // 2. Notificación
            if (Notification.permission === "granted") {
                new Notification("🚨 ALARMA DATA OS", { body: msg });
            }

            // 3. Alerta Visual
            alert("⏰ ALARMA: " + msg);
        }

        function deleteAlarm(id) {
            alarms = alarms.filter(x => x.id !== id);
            localStorage.setItem('alarms_v3', JSON.stringify(alarms));
            render();
        }

        render();
    </script>
</body>
</html>
