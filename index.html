<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskEng Pro - Final Edition</title>
    
    <meta name="theme-color" content="#0f121d">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root {
            --bg: #0f121d;
            --sidebar-bg: #161b2c;
            --accent: #7986cb;
            --text: #ffffff;
            --card-bg: #1e2538;
            --max-w: 480px; /* Ancho ideal para gestión en PC */
        }

        * {
            box-sizing: border-box; /* Esto arregla los márgenes que viste mal */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center; /* Centra la app en monitores grandes */
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 260px;
            height: 100%;
            background: var(--sidebar-bg);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            padding: 40px 20px;
            box-shadow: 15px 0 30px rgba(0,0,0,0.5);
        }

        #sidebar.active { left: 0; }

        .nav-item {
            padding: 16px;
            margin: 10px 0;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
        }

        .nav-item:hover { background: rgba(121, 134, 203, 0.1); color: white; }
        .nav-item.active { background: var(--accent); color: white; }

        /* --- CONTENEDOR RESPONSIVO --- */
        #main-container {
            width: 100%;
            max-width: var(--max-w);
            padding: 25px;
            position: relative;
            transition: 0.3s;
        }

        .menu-btn {
            font-size: 28px;
            cursor: pointer;
            margin-bottom: 25px;
            display: inline-block;
            transition: 0.2s;
        }

        /* --- SECCIÓN AZUL (ESTILO TU IMAGEN) --- */
        .blue-section {
            background: var(--accent);
            padding: 25px;
            border-radius: 28px;
            box-shadow: 0 12px 35px rgba(121, 134, 203, 0.25);
            margin-bottom: 30px;
            width: 100%;
        }

        .blue-section label {
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* INPUTS PULIDOS */
        input, textarea, select {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border-radius: 14px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
        }

        .blue-section input {
            background: #ffffff;
            color: #1a1a1a;
        }

        .btn-action {
            background: white;
            color: var(--accent);
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-action:active { transform: scale(0.97); }

        /* --- MODAL DE PIN --- */
        #pin-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .pin-dots { display: flex; gap: 20px; margin: 30px 0; }
        .dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--accent); }
        .dot.filled { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* --- MÓDULOS --- */
        .module { display: none; width: 100%; }
        .module.active { display: block; animation: slideUp 0.4s ease; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #notes-area {
            min-height: 350px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            resize: none;
        }

        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 999;
        }

        /* AJUSTE PARA PANTALLAS PEQUEÑAS */
        @media (max-width: 400px) {
            #main-container { padding: 15px; }
            .blue-section { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div id="sidebar">
        <h2 style="margin-left: 15px; margin-bottom: 40px; color: var(--accent);">TaskEng <small style="font-size: 0.5em; opacity: 0.5;">v2</small></h2>
        <div class="nav-item active" onclick="switchTab('reminders', this)">🔔 Recordatorios</div>
        <div class="nav-item" onclick="switchTab('pendientes', this)">📝 Pendientes</div>
        <div class="nav-item" onclick="tryEnterNotes(this)">🔒 Bloc de Notas</div>
        
        <div style="position: absolute; bottom: 30px; left: 30px; font-size: 11px; opacity: 0.4;">
            SISTEMA DE PRUEBAS BETA
        </div>
    </div>

    <div id="pin-screen">
        <h2 style="letter-spacing: 1px;">MODO PRIVADO</h2>
        <p style="opacity: 0.5; font-size: 14px;">Ingresa el PIN de seguridad</p>
        <div class="pin-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <input type="password" id="pin-hidden" maxlength="4" autofocus 
               style="position: absolute; opacity: 0; pointer-events: none;" oninput="handlePinInput()">
        <button onclick="closePin()" style="background:none; border:none; color:gray; cursor:pointer; font-weight:bold;">CANCELAR</button>
    </div>

    <div id="main-container">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>

        <div id="reminders" class="module active">
            <div class="blue-section">
                <label>Recordatorio con Horario</label>
                <input type="text" id="remText" placeholder="¿Qué debo avisarte?">
                <div style="display: flex; gap: 12px; margin-top: 5px;">
                    <input type="time" id="remTime" style="flex: 1;">
                    <button class="btn-action" style="flex: 1.2;" onclick="saveReminder()">PROGRAMAR</button>
                </div>
            </div>
            <div id="remHistory" style="opacity: 0.6; font-size: 0.8em; padding: 0 10px;"></div>
        </div>

        <div id="pendientes" class="module">
            <h3 style="margin-left: 10px;">Pendientes Diarios</h3>
            <div style="background: var(--card-bg); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
                <input type="text" id="pendText" placeholder="Nueva tarea...">
                <button class="btn-action" style="background: var(--accent); color: white; margin-top: 10px;" onclick="addPend()">GUARDAR</button>
            </div>
            <div id="pendList" style="margin-top: 25px;"></div>
        </div>

        <div id="notes" class="module">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin:0;">Bloc Privado</h3>
                <button onclick="lockNotes()" style="background:none; border:none; color:var(--accent); font-weight:bold; cursor:pointer;">CERRAR 🔒</button>
            </div>
            <textarea id="notes-area" placeholder="Escribe tus notas aquí... se guardan solas." oninput="saveNotes()"></textarea>
        </div>
    </div>

    <script>
        const PIN_ACCESO = "0000"; // Cambiar aquí si lo deseas
        let unlocked = false;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').style.display = 
                document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
        }

        function switchTab(id, el) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(document.getElementById('sidebar').classList.contains('active')) toggleMenu();
        }

        // --- SISTEMA DE PIN ---
        function tryEnterNotes(el) {
            if (unlocked) {
                switchTab('notes', el);
            } else {
                document.getElementById('pin-screen').style.display = 'flex';
                document.getElementById('pin-hidden').focus();
            }
        }

        function handlePinInput() {
            const val = document.getElementById('pin-hidden').value;
            const dots = document.querySelectorAll('.dot');
            
            dots.forEach((dot, i) => {
                i < val.length ? dot.classList.add('filled') : dot.classList.remove('filled');
            });

            if(val.length === 4) {
                if(val === PIN_ACCESO) {
                    unlocked = true;
                    closePin();
                    switchTab('notes', document.querySelectorAll('.nav-item')[2]);
                } else {
                    document.getElementById('pin-hidden').value = "";
                    dots.forEach(d => d.classList.remove('filled'));
                    alert("PIN Incorrecto");
                }
            }
        }

        function closePin() {
            document.getElementById('pin-screen').style.display = 'none';
            document.getElementById('pin-hidden').value = "";
        }

        function lockNotes() {
            unlocked = false;
            switchTab('reminders', document.querySelectorAll('.nav-item')[0]);
        }

        // --- PERSISTENCIA ---
        function saveNotes() {
            localStorage.setItem('taskeng_notes', document.getElementById('notes-area').value);
        }

        function saveReminder() {
            const t = document.getElementById('remText').value;
            const h = document.getElementById('remTime').value;
            if(!t || !h) return;
            alert("Recordatorio listo: " + h);
            document.getElementById('remText').value = "";
        }

        window.onload = () => {
            document.getElementById('notes-area').value = localStorage.getItem('taskeng_notes') || "";
        }
    </script>
</body>
</html>
