<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DATA OS - Stark Bóveda Pro</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        /* VARIABLES DE ESTILO EXACTAS DEL DISEÑO DE BÓVEDA OSCURA */
        :root { 
            --bg: #141414; 
            --surface-glass: rgba(30, 30, 30, 0.7); 
            --header: #1a1a1a; 
            --accent: #D1FFCC; 
            --danger: #EF4444; 
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --border-glass: rgba(255, 255, 255, 0.1);
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent; 
        }

        /* --- SISTEMA DE NAVEGACIÓN RESPONSIVE PRO --- */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .system-bar { 
            background: var(--header); 
            padding: 15px 20px; 
            display: none; 
            border-bottom: 1px solid var(--border-glass); 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .bar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .bar-content h1 { font-weight: 900; font-size: 1.5em; letter-spacing: 1px; }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
        }

        .logout-btn {
            color: var(--danger);
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 900;
            text-transform: uppercase;
            padding: 5px 10px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
        }

        .filter-tags {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            -webkit-overflow-scrolling: touch; 
        }
        .filter-tags::-webkit-scrollbar { display: none; } 

        .tag {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85em;
            cursor: pointer;
            border: 1px solid transparent;
            white-space: nowrap;
            transition: 0.3s;
        }
        .tag:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }
        .tag.active-tag {
            background: var(--accent);
            color: var(--header);
            font-weight: 600;
        }

        .screen-container { flex: 1; }

        .screen { 
            display: none; 
            padding: 20px; 
            width: 100%;
            max-width: 600px; 
            margin: 0 auto; 
            animation: fadeIn 0.4s ease; 
        }
        .active { display: block !important; }

        /* --- ESTRUCTURA DE TARJETA --- */
        .data-item {
            background: var(--surface-glass);
            backdrop-filter: blur(10px); 
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .data-item:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

        .item-icon-wrapper {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent);
            width: 50px; height: 50px;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5em;
            border: 1px solid var(--border-glass);
        }

        .item-details { flex: 1; }
        .item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .item-title { font-weight: 900; color: var(--text-primary); font-size: 1.1em; letter-spacing: 0.5px; }
        .item-label { background: rgba(255, 255, 255, 0.05); color: var(--text-secondary); padding: 4px 10px; border-radius: 15px; font-size: 0.7em; text-transform: uppercase; font-weight: 600;}
        
        /* Contraseña oculta */
        .item-name { color: var(--text-secondary); font-size: 0.95em; letter-spacing: 2px; font-family: monospace; }
        .item-options { color: var(--text-secondary); cursor: pointer; opacity: 0.7; }
        .item-options:hover { color: var(--accent); opacity: 1; }

        .item-footer { display: flex; align-items: center; gap: 10px; font-size: 0.75em; color: var(--text-secondary); margin-top: 8px;}
        .item-footer span { display: flex; align-items: center; gap: 5px; }

        .action-float-btns {
            position: sticky;
            bottom: 100px; 
            left: 0; width: 100%;
            display: none; 
            justify-content: center;
            gap: 20px;
            pointer-events: none; 
            z-index: 100;
        }
        .float-btn {
            background: #2a2a2a;
            color: var(--text-primary);
            width: 70px; height: 70px;
            border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid var(--border-glass);
            pointer-events: auto; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .float-btn:hover { background: #333; transform: translateY(-3px); }
        .float-btn b { font-size: 1.5em; margin-bottom: 2px; }
        .float-btn span { font-size: 0.65em; text-transform: uppercase; font-weight: 600; }
        .btn-center { background: var(--header); width: 80px; height: 80px;} 

        .pwa-nav {
            background: var(--header);
            color: var(--text-secondary);
            padding: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 1000;
            border-top: 1px solid var(--border-glass);
            box-shadow: 0 -4px 15px rgba(0,0,0,0.2);
        }

        .nav-item { cursor: pointer; text-align: center; font-size: 0.8em; opacity: 0.7; transition: 0.3s; }
        .nav-item:hover { opacity: 1; color: var(--text-primary); }
        .nav-item.active-link { opacity: 1; color: var(--accent); }
        .nav-item b { display: block; font-size: 1.5em; margin-bottom: 2px; }

        @media (min-width: 992px) {
            body { flex-direction: row; }
            .main-wrapper { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); }
            .system-bar { position: relative; width: 100%; display: flex; flex-direction: column; align-items: flex-start; padding: 30px; }
            .bar-content { width: 100%; margin-bottom: 20px; }
            .pwa-nav {
                width: var(--sidebar-width); height: 100vh; left: 0; top: 0;
                flex-direction: column; justify-content: flex-start; padding: 50px 20px;
                border-top: none; border-right: 1px solid var(--border-glass);
            }
            .nav-item {
                width: 100%; text-align: left; padding: 15px 20px; margin-bottom: 10px;
                border-radius: 12px; font-size: 1.1em; display: flex; align-items: center; gap: 15px;
            }
            .nav-item:hover { background: rgba(255,255,255,0.05); }
            .nav-item.active-link { background: rgba(209, 255, 204, 0.1); color: var(--accent); }
            .screen { max-width: 900px; padding: 60px; }
            .action-float-btns {
                position: relative; bottom: 0; width: 100%; display: flex; justify-content: flex-start;
                gap: 20px; pointer-events: auto; margin-bottom: 30px; padding-left: 20px; z-index: 10;
            }
            .float-btn { width: 100px; height: 100px; border-radius: 15px; }
            .float-btn span { font-size: 0.7em;}
            .btn-center { background: #2a2a2a; border-radius: 15px;}
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input, textarea { 
            width: 100%; padding: 18px; margin-bottom: 15px; 
            border: 2px solid transparent; background: rgba(255, 255, 255, 0.05); 
            border-radius: 15px; font-size: 1em; outline: none;
            color: var(--text-primary); transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.1); }
        
        .btn-primary { 
            background: var(--header); color: var(--text-primary); padding: 18px; 
            border: 1px solid var(--border-glass); border-radius: 15px; width: 100%; 
            font-weight: 900; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .btn-primary:hover { background: #222; border-color: var(--accent); color: var(--accent); box-shadow: 0 6px 15px rgba(0,0,0,0.2); }
        
        /* Estilo específico para el botón de Google */
        .btn-google {
            background: #FFFFFF; color: #1a1a1a;
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .btn-google:hover { background: #f0f0f0; border-color: transparent; color: #1a1a1a; }
    </style>
</head>
<body>

    <nav class="pwa-nav" id="main-nav" style="display: none;">
        <div class="nav-item active-link" onclick="navTo('dashboard')"><b>🏠</b>INICIO</div>
        <div class="nav-item" onclick="navTo('add-note')"><b>➕</b>NUEVO</div>
        <div class="nav-item" onclick="location.reload()"><b>🔄</b>SYNC</div>
    </nav>

    <div class="main-wrapper">
        <header class="system-bar" id="sys-bar">
            <div class="bar-content">
                <h1>Boveda</h1>
                <div class="user-profile">
                    <img id="user-avatar" class="user-avatar" src="" alt="User">
                    <div class="logout-btn" onclick="handleLogout()">Salir</div>
                </div>
            </div>
            <div class="filter-tags">
                <div class="tag active-tag">All</div>
                <div class="tag">Importantes</div>
                <div class="tag">Finanzas</div>
                <div class="tag">Contraseñas</div>
                <div class="tag">Notas</div>
            </div>
        </header>

        <div class="screen-container">
            <div id="login" class="screen active">
                <div style="text-align: center; margin-bottom: 50px; margin-top: 50px;">
                    <div style="background: var(--header); width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; border: 2px solid var(--border-glass);">
                        <b style="font-size: 2.5em; color: var(--accent);">D</b>
                    </div>
                    <h1 style="font-weight: 900; font-size: 2.5em; color: var(--text-primary); letter-spacing: 2px;">DATA OS Pro</h1>
                    <p style="color: var(--text-secondary); opacity: 0.6; text-transform: uppercase; letter-spacing: 1px;">Protocolo Biométrico</p>
                </div>
                <div class="data-item" style="padding: 30px; display: block; text-align: center;">
                    <label style="display: block; margin-bottom: 25px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px;">ACCESO AUTORIZADO REQUERIDO</label>
                    <button class="btn-primary btn-google" id="btnGoogleLogin">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="24" height="24" alt="Google">
                        ENTRAR CON GMAIL
                    </button>
                </div>
            </div>

            <div id="dashboard" class="screen" style="position: relative;">
                <div class="action-float-btns" id="action-btns">
                    <div class="float-btn" onclick="navTo('add-note')"><b>✎</b><span>EDITAR</span></div>
                    <div class="float-btn btn-center" onclick="alert('Bóveda Bloqueada')"><b>🔒</b><span>Lock</span></div>
                    <div class="float-btn" style="color:var(--danger);" onclick="alert('Selecciona un elemento para borrar')"><b>✕</b><span>BORRAR</span></div>
                </div>
                <div id="notes-list" style="margin-top: 20px; padding-bottom: 100px;">Verificando credenciales...</div>
            </div>

            <div id="add-note" class="screen">
                <h2 style="margin-bottom: 30px; font-weight: 900; letter-spacing: 1px;">NUEVO REGISTRO ENCRIPTADO</h2>
                <div class="data-item" style="display: block; padding: 30px;">
                    <label style="display: block; margin-bottom: 10px; font-weight: 600; color: var(--text-secondary);">IDENTIFICADOR / TÍTULO</label>
                    <input type="text" id="note-title" placeholder="Ej: Gimnasio, Banco, Wi-Fi">
                    
                    <label style="display: block; margin-bottom: 10px; font-weight: 600; color: var(--text-secondary); margin-top: 15px;">CONTENIDO DEL SECRETO</label>
                    <textarea id="note-text" placeholder="Ingresa el secreto, contraseña o dato crítico..." rows="6"></textarea>
                    
                    <button class="btn-primary" id="btnSave">ENCRIPTAR Y GUARDAR Pro</button>
                    <button onclick="navTo('dashboard')" style="background:none; border:none; width:100%; margin-top:15px; cursor:pointer; color:var(--text-secondary); opacity:0.5; font-size: 0.9em;">Cancelar Operación</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-auth.js";

        // CONFIGURACIÓN ORIGINAL
        const firebaseConfig = {
            apiKey: "AIzaSyDlmtpUfYjs33qa9tLE7Fv2C5yszSZEnUw",
            authDomain: "data-os-db30b.firebaseapp.com",
            projectId: "data-os-db30b",
            storageBucket: "data-os-db30b.firebasestorage.app",
            messagingSenderId: "149593183974",
            appId: "1:149593183974:web:e588fbee9a618e21980d27"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let unsubscribeSnapshot = null;

        // INICIO DE SESIÓN CON GOOGLE
        document.getElementById('btnGoogleLogin').onclick = () => {
            signInWithPopup(auth, provider).catch((error) => {
                alert("Error de autenticación: " + error.message);
            });
        };

        // CIERRE DE SESIÓN
        window.handleLogout = () => {
            signOut(auth).then(() => {
                if(unsubscribeSnapshot) unsubscribeSnapshot();
            });
        };

        // OBSERVADOR DE ESTADO DE AUTENTICACIÓN
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Usuario autenticado
                window.currentUser = user.uid; // Usamos el UID único de Google para asegurar sus datos
                
                // Actualizar UI
                document.getElementById('user-avatar').src = user.photoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                document.getElementById('sys-bar').style.display = 'block';
                document.getElementById('main-nav').style.display = 'flex';
                document.getElementById('action-btns').style.display = 'flex';
                
                navTo('dashboard');
                loadNotes();
            } else {
                // Usuario no autenticado
                window.currentUser = null;
                
                // Ocultar elementos de UI
                document.getElementById('sys-bar').style.display = 'none';
                document.getElementById('main-nav').style.display = 'none';
                document.getElementById('action-btns').style.display = 'none';
                document.getElementById('notes-list').innerHTML = "Verificando credenciales...";
                
                navTo('login');
            }
        });

        const loadNotes = () => {
            if(unsubscribeSnapshot) unsubscribeSnapshot(); // Limpiar listener previo

            const q = query(collection(db, "boveda"), where("usuario", "==", window.currentUser));
            unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
                let html = "";
                snapshot.forEach((d) => {
                    const data = d.data();
                    const fecha = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "New";
                    
                    // Secreto oculto por asteriscos para seguridad contra mirones
                    const secretoOculto = "••••••••••••"; 
                    
                    html += `
                        <div class="data-item">
                            <div class="item-icon-wrapper"><b>🔒</b></div>
                            <div class="item-details">
                                <div class="item-row">
                                    <div class="item-title">${data.titulo || 'Registro'}</div>
                                    <div class="item-label">Secreto</div>
                                </div>
                                <div class="item-row" style="margin-bottom: 0;">
                                    <div class="item-name" title="${data.secreto}">${secretoOculto}</div>
                                    <div class="item-options" onclick="alert('Tu secreto es: \\n${data.secreto}')"><b>👁️</b></div>
                                </div>
                                <div class="item-footer">
                                    <span>🕒 ${fecha}</span>
                                    <span style="margin-left:auto; color:var(--danger); font-size: 1.1em; cursor:pointer;" onclick="eliminar('${d.id}')">✕</span>
                                </div>
                            </div>
                        </div>`;
                });
                document.getElementById('notes-list').innerHTML = html || "<p style='color:var(--text-secondary); text-align:center;'>Bóveda vacía. Registra tu primer secreto.</p>";
            });
        };

        window.eliminar = async (id) => {
            if(confirm("¿Confirmas la purga de este registro crítico?")) {
                await deleteDoc(doc(db, "boveda", id));
            }
        };

        document.getElementById('btnSave').onclick = async () => {
            const tit = document.getElementById('note-title').value.trim();
            const sec = document.getElementById('note-text').value.trim();
            if(!sec) return;
            
            await addDoc(collection(db, "boveda"), { 
                usuario: window.currentUser, 
                titulo: tit || "Nota",
                secreto: sec,
                timestamp: serverTimestamp() 
            });

            document.getElementById('note-title').value = "";
            document.getElementById('note-text').value = "";
            navTo('dashboard');
        };
    </script>

    <script>
        function navTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active-link'));
            if(id === 'dashboard') document.querySelectorAll('.nav-item')[0].classList.add('active-link');
            if(id === 'add-note') document.querySelectorAll('.nav-item')[1].classList.add('active-link');

            window.scrollTo(0,0);
        }

        document.querySelectorAll('.tag').forEach(tag => {
            tag.addEventListener('click', () => {
                document.querySelectorAll('.tag').forEach(t => t.classList.remove('active-tag'));
                tag.classList.add('active-tag');
            });
        });
    </script>
</body>
</html>
