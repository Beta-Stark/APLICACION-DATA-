<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TaskEng Pro - Responsive Fix</title>
    
    <style>
        :root {
            --bg: #0f121d;
            --sidebar-bg: #161b2c;
            --accent: #7986cb;
            --text: #ffffff;
            --card-bg: #1e2538;
        }

        /* RESET TOTAL */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 260px;
            height: 100%;
            background: var(--sidebar-bg);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            padding: 40px 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        #sidebar.active { left: 0; }

        .nav-item {
            padding: 15px;
            margin: 8px 0;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            transition: 0.2s;
        }

        .nav-item.active { background: var(--accent); color: white; }

        /* --- CONTENEDOR PRINCIPAL RESPONSIVO --- */
        .wrapper {
            width: 100%;
            display: flex;
            justify-content: center; /* Centra el contenido en WEB */
            padding: 20px;
        }

        #main-container {
            width: 100%;
            max-width: 600px; /* Ancho máximo en WEB para que no se deforme */
            padding-top: 10px;
        }

        .menu-btn {
            font-size: 30px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
            color: var(--accent);
        }

        /* --- TARJETAS Y SECCIONES --- */
        .blue-section {
            background: var(--accent);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(121, 134, 203, 0.2);
            margin-bottom: 25px;
            width: 100%; /* Ocupa todo el ancho del contenedor */
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap; /* En pantallas muy pequeñas, baja el botón */
        }

        input, textarea, .btn-action {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .blue-section input { background: white; color: #1a1a1a; }
        
        #remTime { flex: 1; min-width: 120px; }
        .btn-prog { flex: 1.5; min-width: 150px; background: white; color: var(--accent); font-weight: 800; cursor: pointer; }

        /* --- PANTALLA PIN --- */
        #pin-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .pin-dots { display: flex; gap: 20px; margin: 30px 0; }
        .dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--accent); }
        .dot.filled { background: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* --- MODULOS --- */
        .module { display: none; width: 100%; }
        .module.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #notes-area { min-height: 300px; background: var(--card-bg); resize: none; }

        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 999;
        }

        /* --- QUERIES PARA ANDROID / MÓVIL --- */
        @media (max-width: 600px) {
            .wrapper { padding: 15px; }
            .blue-section { padding: 20px; border-radius: 20px; }
            #main-container { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div id="sidebar">
        <h2 style="margin-bottom: 30px; color: var(--accent); padding-left: 10px;">TaskEng Pro</h2>
        <div class="nav-item active" onclick="switchTab('reminders', this)">🔔 Recordatorios</div>
        <div class="nav-item" onclick="switchTab('pendientes', this)">📝 Pendientes</div>
        <div class="nav-item" onclick="tryEnterNotes(this)">🔒 Notas Privadas</div>
    </div>

    <div id="pin-screen">
        <h2>ACCESO PROTEGIDO</h2>
        <div class="pin-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <input type="password" id="pin-hidden" maxlength="4" autofocus style="position: absolute; opacity: 0;" oninput="handlePinInput()">
        <button onclick="closePin()" style="background:none; border:none; color:gray; cursor:pointer;">Cancelar</button>
    </div>

    <div class="wrapper">
        <div id="main-container">
            <div class="menu-btn" onclick="toggleMenu()">☰</div>

            <div id="reminders" class="module active">
                <div class="blue-section">
                    <p style="font-size: 11px; font-weight: 800; margin-bottom: 5px; opacity: 0.9;">RECORDATORIO CON HORARIO</p>
                    <input type="text" id="remText" placeholder="¿Qué quieres recordar?">
                    <div class="input-row">
                        <input type="time" id="remTime">
                        <button class="btn-prog btn-action" onclick="saveRem()">PROGRAMAR</button>
                    </div>
                </div>
            </div>

            <div id="pendientes" class="module">
                <h3 style="margin-bottom: 15px;">Mis Pendientes</h3>
                <div style="background: var(--card-bg); padding: 20px; border-radius: 20px;">
                    <input type="text" id="pendInput" placeholder="Nueva tarea...">
                    <button class="btn-action" style="background: var(--accent); margin-top: 10px;" onclick="addPend()">Guardar Pendiente</button>
                </div>
                <div id="pendList" style="margin-top: 20px;"></div>
            </div>

            <div id="notes" class="module">
                <div style="display:flex; justify-content: space-between; margin-bottom: 15px;">
                    <h3>Bloc de Notas</h3>
                    <button onclick="lockNotes()" style="background:none; border:none; color:var(--accent); font-weight:bold;">Cerrar 🔒</button>
                </div>
                <textarea id="notes-area" oninput="saveNotes()" placeholder="Escribe aquí..."></textarea>
            </div>
        </div>
    </div>

    <script>
        const PIN_ACCESO = "0000";
        let unlocked = false;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').style.display = 
                document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
        }

        function switchTab(id, el) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(window.innerWidth < 1000) toggleMenu();
        }

        function tryEnterNotes(el) {
            if (unlocked) switchTab('notes', el);
            else {
                document.getElementById('pin-screen').style.display = 'flex';
                document.getElementById('pin-hidden').focus();
            }
        }

        function handlePinInput() {
            const val = document.getElementById('pin-hidden').value;
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => i < val.length ? dot.classList.add('filled') : dot.classList.remove('filled'));

            if(val.length === 4) {
                if(val === PIN_ACCESO) {
                    unlocked = true;
                    document.getElementById('pin-screen').style.display = 'none';
                    switchTab('notes', document.querySelectorAll('.nav-item')[2]);
                } else {
                    document.getElementById('pin-hidden').value = "";
                    dots.forEach(d => d.classList.remove('filled'));
                    alert("PIN Incorrecto");
                }
            }
        }

        function closePin() { document.getElementById('pin-screen').style.display = 'none'; }
        function lockNotes() { unlocked = false; switchTab('reminders', document.querySelectorAll('.nav-item')[0]); }
        function saveNotes() { localStorage.setItem('notes', document.getElementById('notes-area').value); }

        window.onload = () => {
            document.getElementById('notes-area').value = localStorage.getItem('notes') || "";
        };

        function saveRem() { alert("Alarma Programada"); }
    </script>
</body>
</html>
