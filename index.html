<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskEng Pro - Programador</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a237e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1087/1087815.png">

    <style>
        :root { 
            --primary: #3949ab; 
            --cat-a: #ff5252; --cat-b: #ffd740; --cat-c: #69f0ae; 
            --bg: #ffffff; --card: #f8f9fa; --text: #1a1a1a;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212; --card: #1e1e1e; --text: #e0e0e0;
                --primary: #7986cb;
            }
        }

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding: env(safe-area-inset-top) 15px 20px; color: var(--text); transition: 0.3s; }
        .container { max-width: 500px; margin: auto; }
        
        h2 { text-align: center; color: var(--primary); margin: 20px 0; }

        .btn-notify { 
            background: #ff9800; color: white; border: none; padding: 12px; 
            border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 20px; 
            cursor: pointer; display: block;
        }

        /* Sección de Recordatorios Programados */
        .reminder-box { background: var(--primary); color: white; padding: 18px; border-radius: 18px; margin-bottom: 25px; box-shadow: 0 6px 15px rgba(57,73,171,0.2); }
        .reminder-box label { color: white; font-size: 0.75em; text-transform: uppercase; font-weight: bold; opacity: 0.9; }
        .reminder-inputs { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .reminder-inputs input { border: none; border-radius: 10px; padding: 12px; font-size: 1em; }
        .btn-rem { background: white; color: var(--primary); border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .stats-bar { display: flex; justify-content: space-around; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 15px; }
        .stat-item { text-align: center; font-size: 0.75em; font-weight: bold; }
        .stat-count { display: block; font-size: 1.4em; color: var(--primary); }

        .filters { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .filter-chip { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--primary); background: transparent; color: var(--primary); font-size: 0.8em; white-space: nowrap; }
        .filter-chip.active { background: var(--primary); color: white; }

        .input-group { background: var(--card); padding: 20px; border-radius: 18px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        input { background: var(--bg); color: var(--text); padding: 14px; border: 1px solid #444; border-radius: 12px; font-size: 1em; outline: none; }
        
        .btn-add { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; }

        .task-item { padding: 18px; margin-bottom: 12px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .cat-a { background: var(--cat-a); } .cat-b { background: var(--cat-b); color: #222; } .cat-c { background: var(--cat-c); color: #222; }
        .btn-del { background: rgba(0,0,0,0.1); border: none; color: inherit; padding: 8px 12px; border-radius: 10px; font-weight: bold; }

        #quickList div { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; margin-top: 5px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 TaskEng Pro</h2>

    <button id="notifBtn" class="btn-notify" onclick="requestNotificationPermission()">🔔 Activar Notificaciones</button>

    <div class="reminder-box">
        <label>Nuevo Recordatorio con Horario</label>
        <div class="reminder-inputs">
            <input type="text" id="remText" placeholder="¿Qué debo recordarte?">
            <div style="display: flex; gap: 10px;">
                <input type="time" id="remTime" style="flex: 1;">
                <button class="btn-rem" onclick="addScheduledReminder()">Programar</button>
            </div>
        </div>
        <div id="quickList"></div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><span id="countA" class="stat-count">0</span> CAT A</div>
        <div class="stat-item"><span id="countB" class="stat-count">0</span> CAT B</div>
        <div class="stat-item"><span id="countC" class="stat-count">0</span> CAT C</div>
    </div>

    <div class="filters">
        <button class="filter-chip active" onclick="filterTasks('all', this)">Todas</button>
        <button class="filter-chip" onclick="filterTasks('A', this)">Urgentes</button>
        <button class="filter-chip" onclick="filterTasks('B', this)">Próximas</button>
    </div>
    
    <div class="input-group">
        <label style="font-size: 0.7em; font-weight: bold; color: var(--primary);">AGREGAR TAREA A CALENDARIO</label>
        <input type="text" id="taskName" placeholder="Materia / Proyecto">
        <input type="date" id="taskDate">
        <button class="btn-add" onclick="addTask()">Guardar Tarea</button>
    </div>

    <div id="taskList"></div>
</div>

<script>
    let currentFilter = 'all';

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    window.onload = () => {
        renderTasks();
        if (Notification.permission === "granted") document.getElementById('notifBtn').style.display = 'none';
    };

    function requestNotificationPermission() {
        Notification.requestPermission().then(p => {
            if (p === "granted") {
                document.getElementById('notifBtn').style.display = 'none';
                sendInstantNotif("¡Sistema Listo!", "Te avisaré a las horas programadas.");
            }
        });
    }

    function sendInstantNotif(title, msg) {
        if (Notification.permission === "granted") {
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification(title, { body: msg, icon: 'https://cdn-icons-png.flaticon.com/512/1087/1087815.png' });
            });
        }
    }

    // FUNCIÓN PARA PROGRAMAR HORARIOS
    function addScheduledReminder() {
        const text = document.getElementById('remText').value;
        const time = document.getElementById('remTime').value;

        if (!text || !time) return alert("Ingresa tarea y hora");

        const now = new Date();
        const [h, m] = time.split(':');
        let target = new Date();
        target.setHours(h, m, 0, 0);

        if (target <= now) target.setDate(target.getDate() + 1);

        const delay = target - now;

        // Mostrar en lista
        const list = document.getElementById('quickList');
        const item = document.createElement('div');
        item.innerHTML = `⏰ ${time} - ${text}`;
        list.appendChild(item);

        // Enviar al Service Worker para que espere el tiempo
        if (Notification.permission === "granted") {
            navigator.serviceWorker.ready.then(reg => {
                // Usamos un temporizador
                setTimeout(() => {
                    reg.showNotification("🔔 Recordatorio", {
                        body: text,
                        vibrate: [200, 100, 200],
                        requireInteraction: true
                    });
                    item.style.opacity = "0.3";
                }, delay);
            });
            alert("Recordatorio programado con éxito");
        } else {
            alert("Primero activa las notificaciones con el botón naranja");
        }

        document.getElementById('remText').value = "";
    }

    function addTask() {
        const name = document.getElementById('taskName').value;
        const dateVal = document.getElementById('taskDate').value;
        if (!name || !dateVal) return;

        const today = new Date(); today.setHours(0,0,0,0);
        const deadline = new Date(dateVal); deadline.setHours(0,0,0,0);
        const diffInDays = Math.ceil((deadline - today) / (1000 * 60 * 60 * 24));

        let cat = diffInDays <= 2 ? "A" : (diffInDays <= 5 ? "B" : "C");
        const history = JSON.parse(localStorage.getItem('devTasks')) || [];
        history.push({ id: Date.now(), name, days: diffInDays, cat });
        localStorage.setItem('devTasks', JSON.stringify(history));

        if (cat === "A") sendInstantNotif("⚠️ Tarea Crítica", `"${name}" vence pronto.`);
        renderTasks();
    }

    function deleteTask(id) {
        let history = JSON.parse(localStorage.getItem('devTasks'));
        localStorage.setItem('devTasks', JSON.stringify(history.filter(t => t.id !== id)));
        renderTasks();
    }

    function filterTasks(cat, btn) {
        currentFilter = cat;
        document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = "";
        let history = JSON.parse(localStorage.getItem('devTasks')) || [];

        document.getElementById('countA').innerText = history.filter(t => t.cat === 'A').length;
        document.getElementById('countB').innerText = history.filter(t => t.cat === 'B').length;
        document.getElementById('countC').innerText = history.filter(t => t.cat === 'C').length;

        if (currentFilter !== 'all') history = history.filter(t => t.cat === currentFilter);

        history.sort((a, b) => a.days - b.days).forEach(t => {
            const div = document.createElement('div');
            div.className = `task-item cat-${t.cat.toLowerCase()}`;
            div.innerHTML = `<div><strong>${t.name}</strong><small>${t.days < 0 ? 'Vencida' : 'Faltan ' + t.days + ' días'}</small></div><button class="btn-del" onclick="deleteTask(${t.id})">x</button>`;
            list.appendChild(div);
        });
    }
</script>
</body>
</html>
