<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-messaging.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDlmtpUfYjs33qa9tLE7Fv2C5yszSZEnUw",
        authDomain: "data-os-db30b.firebaseapp.com",
        projectId: "data-os-db30b",
        storageBucket: "data-os-db30b.firebasestorage.app",
        messagingSenderId: "149593183974",
        appId: "1:149593183974:web:e588fbee9a618e21980d27",
        measurementId: "G-VT52P7RX7K"
    };

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);

    // Registro específico para la subcarpeta de GitHub Pages
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/APLICACION-DATA-/firebase-messaging-sw.js', {
            scope: '/APLICACION-DATA-/'
        }).then(reg => console.log('FCM SW Registrado:', reg.scope))
          .catch(err => console.log('Fallo registro SW:', err));
    }

    window.requestPermission = async () => {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
            try {
                // Obtenemos el registro actual para pasárselo a Firebase
                const registration = await navigator.serviceWorker.getRegistration('/APLICACION-DATA-/');
                
                const token = await getToken(messaging, { 
                    vapidKey: 'BPqre3i_E99vzlH1LUr0iYibIU2nLffn_3J4iyjs2w4EFd1b87FZH01ltDkrQQng7ZSrHIJTdE0TnqaJQeOGKiA', 
                    serviceWorkerRegistration: registration 
                });
                
                if (token) {
                    console.log("Token FCM:", token);
                    alert("¡Dispositivo vinculado! Token generado en consola.");
                }
            } catch (err) {
                console.error("Error al obtener token:", err);
            }
        }
    };

    onMessage(messaging, (payload) => {
        new Notification(payload.notification.title, {
            body: payload.notification.body,
            icon: 'https://cdn-icons-png.flaticon.com/512/1087/1087815.png'
        });
    });
</script>
