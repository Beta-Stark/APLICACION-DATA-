<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA OS - Stark Bóveda</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #F7EFE2; 
            --surface: rgba(255, 255, 255, 0.9); 
            --header: #2A3A4A; 
            --danger: #EF4444;
            --text: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Contenedor Principal */
        .app-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* Pantallas */
        .screen { display: none; padding: 20px; width: 100%; max-width: 800px; margin: 0 auto; }
        .active { display: block; animation: fadeIn 0.4s ease; }

        /* Estilo de Tarjetas */
        .data-item {
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(0,0,0,0.1);
            position: relative;
        }

        .delete-btn { color: var(--danger); cursor: pointer; float: right; font-weight: 900; }

        /* Navegación Móvil */
        .nav-bar {
            background: var(--header);
            color: white;
            padding: 15px;
            text-align: center;
        }

        /* Estilos Responsive para Desktop */
        @media (min-width: 768px) {
            .app-layout { flex-direction: row; }
            .nav-bar { width: 250px; height: 100vh; text-align: left; padding: 40px; }
            .screen { margin: 40px; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        input, textarea, button { padding: 12px; width: 100%; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; display: block; }
        button { background: var(--header); color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-layout">
        <nav class="nav-bar">
            <h3>DATA OS</h3>
            <p>Stark Bóveda</p>
        </nav>

        <div class="content-area">
            <div id="login" class="screen active">
                <h2>Acceso a Bóveda</h2>
                <input type="password" id="pin" placeholder="Ingresa PIN">
                <button id="btnLogin">Desbloquear</button>
            </div>

            <div id="dashboard" class="screen">
                <h3>Secretos Almacenados</h3>
                <div id="notes-list"></div>
                <hr style="margin: 20px 0;">
                <input type="text" id="note-title" placeholder="Título">
                <textarea id="note-text" placeholder="Contenido del secreto"></textarea>
                <button id="btnSave">Guardar en Bóveda</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-firestore.js";

        // Configuración (Mantén tus llaves originales aquí)
        const firebaseConfig = {
             // ... tu configuración ...
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Variables globales
        window.currentUser = null;

        // Login Logic
        document.getElementById('btnLogin').onclick = () => {
            const pin = document.getElementById('pin').value;
            if (pin === "1234") { 
                window.currentUser = "user1";
                document.getElementById('login').classList.remove('active');
                document.getElementById('dashboard').classList.add('active');
                loadNotes();
            } else {
                alert("PIN Incorrecto");
            }
        };

        // Cargar notas
        const loadNotes = () => {
            const q = query(collection(db, "boveda"), where("usuario", "==", window.currentUser));
            onSnapshot(q, (snapshot) => {
                let html = "";
                snapshot.forEach((docSnap) => {
                    const d = docSnap.data();
                    html += `<div class="data-item">
                                <span class="delete-btn" onclick="eliminar('${docSnap.id}')">✕</span>
                                <div style="font-weight:900;">${d.titulo || 'Registro'}</div>
                                <div>${d.secreto || ''}</div>
                             </div>`;
                });
                document.getElementById('notes-list').innerHTML = html || "<p>Bóveda vacía.</p>";
            });
        };

        // Eliminar nota
        window.eliminar = async (id) => {
            if(confirm("¿Borrar elemento?")) await deleteDoc(doc(db, "boveda", id));
        };

        // Guardar nota
        document.getElementById('btnSave').onclick = async () => {
            const tit = document.getElementById('note-title').value.trim();
            const sec = document.getElementById('note-text').value.trim();
            if(!sec) return;
            await addDoc(collection(db, "boveda"), { 
                usuario: window.currentUser, 
                titulo: tit || "Nota",
                secreto: sec,
                timestamp: serverTimestamp() 
            });
            document.getElementById('note-title').value = "";
            document.getElementById('note-text').value = "";
        };
    </script>
</body>
</html>
