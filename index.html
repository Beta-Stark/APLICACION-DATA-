<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DATA OS - Enterprise Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F7EFE2; --surface: #FFFFFF; --header-accent: #2A3A4A;
            --card-cloud: #BBCBBD; --card-vault: #C9A091; --text-main: #2A3A4A;
            --danger: #EF4444; --clock: #D97706;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; padding-bottom: 90px; }
        
        /* HEADER FIJO */
        .system-bar { background: var(--surface); padding: 15px 25px; display: none; justify-content: space-between; align-items: center; border-bottom: 1px solid #E2E8F0; position: sticky; top: 0; z-index: 1000; }
        .role-tag { font-size: 0.7rem; padding: 4px 12px; border-radius: 20px; background: #000; color: #fff; font-weight: 800; text-transform: uppercase; }

        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; max-width: 600px; margin: 0 auto; }
        .screen.active { display: block !important; }
        #login-screen.active { display: flex !important; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }

        /* DISEÑO DE TARJETAS (MAQUETA) */
        .mod-card { padding: 25px; border-radius: 28px; margin-bottom: 20px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .notes-area { background: var(--card-cloud); }
        .vault-area { background: var(--card-vault); color: white; cursor: pointer; }
        
        /* ITEMS DE DATOS */
        .data-item { 
            background: white; padding: 18px; border-radius: 20px; 
            margin-bottom: 12px; position: relative; color: var(--text-main); 
            border: 1px solid rgba(0,0,0,0.05); animation: slideUp 0.3s ease;
        }
        .delete-btn { 
            position: absolute; right: 15px; top: 15px; 
            color: var(--danger) !important; font-weight: 900; 
            font-size: 1.3rem; cursor: pointer; z-index: 10; padding: 5px;
        }

        /* NAVEGACIÓN INFERIOR */
        .pwa-nav { background: white; padding: 15px; display: none; justify-content: space-around; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #ddd; z-index: 1000; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .nav-item { text-align: center; font-size: 0.75rem; color: #888; cursor: pointer; }
        .nav-item.active { color: #6366F1; font-weight: 900; }

        input, textarea { width: 100%; padding: 16px; border-radius: 15px; border: 1px solid #ddd; margin: 10px 0; font-size: 1rem; outline: none; }
        .btn-main { width: 100%; padding: 18px; background: var(--header-accent); color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="system-bar" id="sys-bar">
        <div style="font-weight:900; letter-spacing: 1px;">DATA OS</div>
        <div id="role-display" class="role-tag">VERIFICANDO</div>
        <div id="clock" style="font-weight:800; color:var(--clock)">00:00</div>
    </div>

    <div id="login-screen" class="screen active">
        <h1 style="font-size: 3.5rem; font-weight: 900; margin-bottom: 10px;">DATA OS</h1>
        <p style="margin-bottom: 40px; color: #666; font-weight: 300;">Ingreso de Usuario Autorizado</p>
        <input type="text" id="userInput" placeholder="Nombre de Usuario">
        <input type="password" id="passInput" placeholder="PIN de Acceso">
        <button class="btn-main" onclick="handleLogin()">ACCEDER AL CLOUD</button>
    </div>

    <div id="dashboard" class="screen">
        <h2 id="welcome-msg" style="margin-bottom:25px; font-size: 2.2rem; font-weight: 900;">Hola</h2>
        
        <div class="mod-card notes-area">
            <h3 style="margin-bottom:15px; font-size: 0.9rem; letter-spacing: 1px;">📝 RECORDATORIOS ACTIVOS</h3>
            <div id="notes-preview">Sincronizando con la nube...</div>
            <button class="btn-main" onclick="navTo('mod-notes')" style="background:rgba(255,255,255,0.5); color:black; margin-top:15px; border-radius: 12px; padding: 12px;">Gestionar Lista</button>
        </div>

        <div class="mod-card vault-area" onclick="navTo('mod-vault')">
            <h3 style="font-size: 0.9rem; letter-spacing: 1px;">🔐 BÓVEDA PRIVADA</h3>
            <p id="vault-status" style="margin-top: 10px; font-weight: 300; opacity: 0.9;">Toca para desbloquear seguridad</p>
        </div>
    </div>

    <div id="mod-notes" class="screen">
        <h2 style="margin-bottom: 20px;">Recordatorios</h2>
        <div style="background: white; padding: 20px; border-radius: 25px; margin-bottom: 25px;">
            <textarea id="note-text" placeholder="Escribe tu nota aquí..." style="height: 100px; border:none; background: #f9f9f9;"></textarea>
            <button class="btn-main" id="btnSaveNota">SUBIR A LA NUBE</button>
        </div>
        <div id="notes-full-list"></div>
    </div>

    <div id="mod-vault" class="screen">
        <div id="vault-auth">
            <h2 style="text-align:center; margin-bottom: 30px;">PIN DE SEGURIDAD</h2>
            <div id="numpad" style="display:grid; grid-template-columns:repeat(3,1fr); gap:15px; max-width: 280px; margin: 0 auto;"></div>
        </div>
        <div id="vault-content" style="display:none;">
            <h2 style="margin-bottom: 20px;">Bóveda Cloud</h2>
            <div style="background: white; padding: 20px; border-radius: 25px; margin-bottom: 25px;">
                <input type="text" id="v-title" placeholder="Título (Ej. Tarjeta)">
                <input type="text" id="v-secret" placeholder="Contenido Privado">
                <button class="btn-main" id="btnSaveVault" style="background: var(--card-vault);">GUARDAR EN BÓVEDA</button>
            </div>
            <div id="vault-full-list"></div>
        </div>
    </div>

    <nav class="pwa-nav" id="pwa-nav">
        <div class="nav-item active" onclick="navTo('dashboard')" id="nav-home">🏠<br>Inicio</div>
        <div class="nav-item" onclick="navTo('mod-notes')" id="nav-notes-btn">📝<br>Notas</div>
        <div class="nav-item" onclick="navTo('mod-vault')" id="nav-vault-btn">🔐<br>Bóveda</div>
        <div class="nav-item" onclick="location.reload()" style="color:var(--danger)">✕<br>Salir</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, doc, query, where, onSnapshot, serverTimestamp, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDlmtpUfYjs33qa9tLE7Fv2C5yszSZEnUw",
            authDomain: "data-os-db30b.firebaseapp.com",
            projectId: "data-os-db30b",
            storageBucket: "data-os-db30b.firebasestorage.app",
            messagingSenderId: "149593183974",
            appId: "1:149593183974:web:e588fbee9a618e21980d27"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LOGIN POR BASE DE DATOS
        window.handleLogin = async () => {
            const userIn = document.getElementById('userInput').value.trim();
            const pinIn = document.getElementById('passInput').value;

            if(!userIn || pinIn !== "1234") { alert("Datos incorrectos"); return; }

            const userRef = doc(db, "usuarios_autorizados", userIn);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                window.currentUser = userIn;
                const rol = userSnap.data().rol || "Usuario";
                
                document.getElementById('welcome-msg').innerText = "Hola, " + userIn;
                document.getElementById('role-display').innerText = rol.toUpperCase() + ": " + userIn;
                
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                document.getElementById('sys-bar').style.display = 'flex';
                document.getElementById('pwa-nav').style.display = 'flex';
                
                activarSinc(userIn);
            } else {
                alert("Acceso Denegado: Usuario no registrado en el sistema.");
            }
        };

        // BORRAR
        window.borrarDato = async (col, id) => {
            if(confirm("¿Deseas eliminar este registro de la nube?")) await deleteDoc(doc(db, col, id));
        };

        // GUARDAR
        document.getElementById('btnSaveNota').onclick = async () => {
            const txt = document.getElementById('note-text').value;
            if(!txt) return;
            await addDoc(collection(db, "recordatorios"), { usuario: window.currentUser, texto: txt, timestamp: serverTimestamp() });
            document.getElementById('note-text').value = "";
        };

        document.getElementById('btnSaveVault').onclick = async () => {
            const tit = document.getElementById('v-title').value;
            const sec = document.getElementById('v-secret').value;
            if(!tit || !sec) return;
            await addDoc(collection(db, "boveda"), { usuario: window.currentUser, titulo: tit, secreto: sec, timestamp: serverTimestamp() });
            document.getElementById('v-title').value = ""; document.getElementById('v-secret').value = "";
        };

        // SINCRONIZACIÓN REAL
        function activarSinc(user) {
            onSnapshot(query(collection(db, "recordatorios"), where("usuario", "==", user), orderBy("timestamp", "desc")), (snap) => {
                let h = "";
                snap.forEach(d => {
                    h += `<div class="data-item"><span class="delete-btn" onclick="borrarDato('recordatorios','${d.id}')">✕</span>${d.data().texto}</div>`;
                });
                document.getElementById('notes-full-list').innerHTML = h || "No hay recordatorios.";
                document.getElementById('notes-preview').innerHTML = h ? h.substring(0, 500) : "Sin pendientes hoy.";
            });

            onSnapshot(query(collection(db, "boveda"), where("usuario", "==", user), orderBy("timestamp", "desc")), (snap) => {
                let vh = "";
                snap.forEach(d => {
                    vh += `<div class="data-item" style="border-left: 5px solid var(--card-vault);">
                        <span class="delete-btn" onclick="borrarDato('boveda','${d.id}')">✕</span>
                        <strong>${d.data().titulo}</strong><br><code>${d.data().secreto}</code></div>`;
                });
                document.getElementById('vault-full-list').innerHTML = vh || "Bóveda vacía.";
                document.getElementById('vault-status').innerText = `${snap.size} registros guardados.`;
            });
        }
    </script>

    <script>
        let pinB = "";
        function navTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(id === 'dashboard') document.getElementById('nav-home').classList.add('active');
        }

        const np = document.getElementById('numpad');
        for(let i=1; i<=9; i++) np.innerHTML += `<button onclick="tecP('${i}')" style="padding:18px; border-radius:15px; border:1px solid #ddd; background:white; font-size:1.2rem; font-weight:bold;">${i}</button>`;
        np.innerHTML += `<button onclick="pinB=''" style="padding:18px; border-radius:15px; border:none; background:#eee;">C</button>`;
        np.innerHTML += `<button onclick="tecP('0')" style="padding:18px; border-radius:15px; border:1px solid #ddd; background:white; font-size:1.2rem; font-weight:bold;">0</button>`;

        window.tecP = (n) => {
            pinB += n;
            if(pinB === "1234") {
                document.getElementById('vault-auth').style.display = 'none';
                document.getElementById('vault-content').style.display = 'block';
            } else if(pinB.length >= 4) pinB = "";
        };

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        }, 1000);
    </script>
</body>
</html>
