<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DATA - OS</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #020408;
            --surface: #0a0f1a;
            --accent: #00f2ff; /* Cian Eléctrico */
            --accent-dim: rgba(0, 242, 255, 0.1);
            --text: #ffffff;
            --danger: #ff3d00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow: hidden; }

        .screen { display: none; padding: 25px; height: 100vh; overflow-y: auto; transition: 0.3s; }
        .screen.active { display: block !important; animation: fadeIn 0.4s ease; }

        /* --- TARJETAS CON GESTO --- */
        .swipe-container {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            margin-bottom: 12px;
            background: var(--danger); /* Fondo que se ve al deslizar */
        }

        .item-card {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 24px;
            position: relative;
            z-index: 2;
            transition: transform 0.2s ease-out;
            cursor: grab;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .swipe-label {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-weight: 900;
            font-size: 0.7rem;
            z-index: 1;
        }

        /* --- BÓVEDA CON PIN --- */
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }
        .pin-dot {
            width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--accent);
        }
        .pin-dot.filled { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .numpad {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 250px; margin: 0 auto;
        }
        .num-btn {
            width: 60px; height: 60px; border-radius: 50%; background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .num-btn:active { background: var(--accent); color: black; }

        /* --- DISEÑO ATRACTIVO --- */
        .vault-link {
            background: linear-gradient(90deg, var(--surface) 0%, #16213e 100%);
            border: 1px solid var(--accent-dim);
            padding: 20px; border-radius: 20px; margin-top: 15px;
            display: flex; justify-content: space-between; align-items: center;
            text-decoration: none; color: white;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="dashboard" class="screen active">
        <h1 style="font-weight: 900; font-size: 2.5rem; margin-bottom: 5px;">DATA</h1>
        <p style="color: var(--accent); letter-spacing: 3px; font-size: 0.7rem; font-weight: 900; margin-bottom: 30px;">SECURE OS</p>
        
        <div class="grid">
            <div class="item-card" onclick="showModule('mod-vault')" style="border: 1px solid var(--accent-dim);">
                <span style="font-size: 1.5rem;">🔐</span>
                <div><strong>Bóveda de Enlaces</strong><small style="opacity:0.5; display:block;">Acceso restringido</small></div>
            </div>

            <div class="item-card" onclick="showModule('mod-reminders')">
                <span style="font-size: 1.5rem;">🚨</span>
                <div><strong>Recordatorios</strong><small style="opacity:0.5; display:block;">Desliza para eliminar</small></div>
            </div>
        </div>
    </div>

    <div id="mod-vault" class="screen">
        <span onclick="showModule('dashboard')" style="color:var(--accent); cursor:pointer;">← CANCELAR</span>
        <div id="pin-screen" style="text-align: center; margin-top: 50px;">
            <h2 style="font-weight: 900;">INGRESE PIN</h2>
            <div class="pin-display" id="pin-dots">
                <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
            </div>
            <div class="numpad">
                <div class="num-btn" onclick="pressPin(1)">1</div><div class="num-btn" onclick="pressPin(2)">2</div><div class="num-btn" onclick="pressPin(3)">3</div>
                <div class="num-btn" onclick="pressPin(4)">4</div><div class="num-btn" onclick="pressPin(5)">5</div><div class="num-btn" onclick="pressPin(6)">6</div>
                <div class="num-btn" onclick="pressPin(7)">7</div><div class="num-btn" onclick="pressPin(8)">8</div><div class="num-btn" onclick="pressPin(9)">9</div>
                <div></div><div class="num-btn" onclick="pressPin(0)">0</div>
            </div>
        </div>

        <div id="vault-content" style="display: none;">
            <h2 style="color: var(--accent); margin-bottom: 20px;">Enlaces Seguros</h2>
            <a href="#" class="vault-link">
                <div><strong>Google Drive Proyecto</strong><small style="display:block; opacity:0.5;">Carpeta de evidencias</small></div>
                <span>🚀</span>
            </a>
            <a href="#" class="vault-link">
                <div><strong>Descargar APK Beta</strong><small style="display:block; opacity:0.5;">Versión 1.0.4</small></div>
                <span>📲</span>
            </a>
        </div>
    </div>

    <div id="mod-reminders" class="screen">
        <span onclick="showModule('dashboard')" style="color:var(--accent); cursor:pointer;">← VOLVER</span>
        <h2 style="margin: 20px 0;">Recordatorios</h2>
        
        <div id="reminders-list">
            <div class="swipe-container" id="rem-1">
                <div class="swipe-label">ELIMINAR</div>
                <div class="item-card" 
                     ontouchstart="handleTouchStart(event)" 
                     ontouchmove="handleTouchMove(event)" 
                     ontouchend="handleTouchEnd(event)">
                    <span style="font-size: 1.2rem;">📌</span>
                    <div><strong>Revisar diseño UI</strong><small style="display:block; opacity:0.5;">Hoy 15:00</small></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- LÓGICA DE PIN ---
        let enteredPin = "";
        const correctPin = "1234"; // Aquí puedes cambiar el PIN

        function pressPin(num) {
            if(enteredPin.length < 4) {
                enteredPin += num;
                updatePinDots();
                if(enteredPin.length === 4) {
                    if(enteredPin === correctPin) {
                        document.getElementById('pin-screen').style.display = 'none';
                        document.getElementById('vault-content').style.display = 'block';
                    } else {
                        alert("PIN INCORRECTO");
                        enteredPin = "";
                        updatePinDots();
                    }
                }
            }
        }

        function updatePinDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('filled', i < enteredPin.length);
            });
        }

        // --- LÓGICA DE SWIPE (GESTOS) ---
        let startX = 0;
        let currentElement = null;

        function handleTouchStart(e) {
            startX = e.touches[0].clientX;
            currentElement = e.currentTarget;
            currentElement.style.transition = 'none';
        }

        function handleTouchMove(e) {
            let diff = e.touches[0].clientX - startX;
            if (diff < 0) { // Solo deslizar a la izquierda
                currentElement.style.transform = `translateX(${diff}px)`;
            }
        }

        function handleTouchEnd(e) {
            let diff = e.changedTouches[0].clientX - startX;
            currentElement.style.transition = 'transform 0.3s ease';
            
            if (diff < -150) { // Si deslizó más de 150px
                currentElement.style.transform = 'translateX(-100%)';
                setTimeout(() => {
                    currentElement.parentElement.style.display = 'none';
                }, 300);
            } else {
                currentElement.style.transform = 'translateX(0)';
            }
        }

        function showModule(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            // Reset de bóveda si sale
            if(id !== 'mod-vault') {
                enteredPin = "";
                updatePinDots();
                document.getElementById('pin-screen').style.display = 'block';
                document.getElementById('vault-content').style.display = 'none';
            }
        }
    </script>
</body>
</html>
