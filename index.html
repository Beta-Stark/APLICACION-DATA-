<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA OS - Stark Bóveda</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #F7EFE2; 
            --surface: rgba(255, 255, 255, 0.8); 
            --header: #2A3A4A; 
            --accent: #BBCBBD; 
            --danger: #EF4444;
            --text: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Layout Base */
        .app-container {
            flex: 1;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .screen { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block !important; }

        /* Estilo de Tarjetas Glassmorphism */
        .data-item {
            background: var(--surface);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .delete-btn { color: var(--danger); cursor: pointer; float: right; font-weight: 900; }

        /* Navegación (Mobile First) */
        .pwa-nav {
            background: var(--header);
            color: white;
            padding: 15px;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 1000;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        /* Desktop Mode (Media Query) */
        @media (min-width: 768px) {
            body { flex-direction: row; }
            .pwa-nav {
                width: 250px;
                height: 100vh;
                top: 0;
                bottom: auto;
                border-radius: 0;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                padding-top: 50px;
            }
            .app-container { margin-left: 250px; padding: 50px; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        input, button { padding: 12px; width: 100%; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: var(--header); color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="pwa-nav">
        <h3>DATA OS v7.7</h3>
        <p>Stark Bóveda</p>
    </nav>

    <div class="app-container">
        <div id="login" class="screen active">
            <h2>Acceso a Bóveda</h2>
            <input type="password" id="pin" placeholder="Ingresa PIN de seguridad">
            <button id="btnLogin">Desbloquear</button>
        </div>

        <div id="dashboard" class="screen">
            <h3>Secretos Almacenados</h3>
            <div id="notes-list"></div>
            <hr style="margin: 20px 0;">
            <input type="text" id="note-title" placeholder="Título">
            <textarea id="note-text" placeholder="Contenido del secreto"></textarea>
            <button id="btnSave">Guardar en Bóveda</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-firestore.js";

        // Configuración (Debes mantener la tuya)
        const firebaseConfig = {
            /* Inserta aquí tu config original */
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Lógica de Login
        window.handleLogin = () => {
            const pin = document.getElementById('pin').value;
            if (pin === "1234") { // Tu lógica de PIN
                window.currentUser = "user1";
                navTo('dashboard');
                loadNotes();
            } else {
                alert("PIN Incorrecto");
            }
        };

        const loadNotes = () => {
            const q = query(collection(db, "boveda"), where("usuario", "==", window.currentUser));
            onSnapshot(q, (snapshot) => {
                let html = "";
                snapshot.forEach((docSnap) => {
                    const d = docSnap.data();
                    html += `<div class="data-item">
                                <span class="delete-btn" onclick="eliminar('${docSnap.id}')">✕</span>
                                <div style="font-weight:900;">${d.titulo || 'Registro'}</div>
                                <div>${d.secreto || ''}</div>
                             </div>`;
                });
                document.getElementById('notes-list').innerHTML = html || "<p>Bóveda vacía.</p>";
            });
        };

        window.eliminar = async (id) => {
            if(confirm("¿Borrar elemento?")) await deleteDoc(doc(db, "boveda", id));
        };

        document.getElementById('btnSave').onclick = async () => {
            const tit = document.getElementById('note-title').value.trim();
            const sec = document.getElementById('note-text').value.trim();
            if(!sec) return;
            await addDoc(collection(db, "boveda"), { 
                usuario: window.currentUser, 
                titulo: tit || "Nota",
                secreto: sec,
                timestamp: serverTimestamp() 
            });
            document.getElementById('note-title').value = "";
            document.getElementById('note-text').value = "";
        };

        document.getElementById('btnLogin').onclick = handleLogin;

        function navTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
