<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskEng Pro - Secure</title>
    <style>
        :root {
            --bg: #0f121d; /* El oscuro de tu captura */
            --sidebar-bg: #161b2c;
            --accent: #7986cb; /* Tu azul lavanda */
            --text: #ffffff;
            --card-bg: #1e2538;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            overflow-x: hidden;
        }

        /* --- SIDEBAR IZQUIERDO --- */
        #sidebar {
            position: fixed;
            left: -260px;
            top: 0;
            width: 250px;
            height: 100%;
            background: var(--sidebar-bg);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            padding: 30px 10px;
            box-shadow: 10px 0 20px rgba(0,0,0,0.5);
        }

        #sidebar.active { left: 0; }

        .nav-item {
            padding: 15px 20px;
            margin: 8px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
        }

        .nav-item:hover { background: rgba(121, 134, 203, 0.1); }
        .nav-item.active { background: var(--accent); color: white; }

        /* --- CONTENIDO --- */
        #main-container {
            flex: 1;
            padding: 20px;
            transition: 0.4s;
            max-width: 600px;
            margin: auto;
        }

        .menu-btn {
            font-size: 24px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
        }

        /* Tu diseño de Recordatorio con Horario */
        .blue-section {
            background: var(--accent);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(121, 134, 203, 0.3);
            margin-bottom: 25px;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 15px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .blue-section input { background: #f0f2ff; color: #333; }

        .btn-action {
            background: white;
            color: var(--accent);
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- MODAL PIN --- */
        #pin-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .pin-dots { display: flex; gap: 15px; margin-bottom: 30px; }
        .dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--accent); }
        .dot.filled { background: var(--accent); }

        /* --- MODULOS --- */
        .module { display: none; }
        .module.active { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #notes-area { min-height: 400px; background: var(--card-bg); line-height: 1.6; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="padding: 0 20px; margin-bottom: 40px;">🚀 TaskEng</h2>
        <div class="nav-item active" onclick="switchTab('reminders', this)">🔔 Recordatorios</div>
        <div class="nav-item" onclick="switchTab('pendientes', this)">📝 Pendientes</div>
        <div class="nav-item" onclick="tryEnterNotes(this)">🔒 Bloc de Notas</div>
    </div>

    <div id="pin-screen">
        <h2 style="margin-bottom: 10px;">Acceso Privado</h2>
        <p style="opacity: 0.6; margin-bottom: 30px;">Introduce tu PIN de 4 dígitos</p>
        <div class="pin-dots" id="dots-container">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <input type="password" id="pin-hidden" maxlength="4" autofocus 
               style="position: absolute; opacity: 0; pointer-events: none;" oninput="updateDots()">
        <button onclick="closePin()" style="background:none; border:none; color:gray; cursor:pointer;">Cancelar</button>
    </div>

    <div id="main-container">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>

        <div id="reminders" class="module active">
            <div class="blue-section">
                <label style="font-size: 12px; font-weight: 900; opacity: 0.8;">RECORDATORIO CON HORARIO</label>
                <input type="text" placeholder="Ej: Estudiar para examen...">
                <div style="display: flex; gap: 10px;">
                    <input type="time" style="flex: 1;">
                    <button class="btn-action" style="flex: 1;">PROGRAMAR</button>
                </div>
            </div>
        </div>

        <div id="pendientes" class="module">
            <h2>Lista de Pendientes</h2>
            <div style="background: var(--card-bg); padding: 20px; border-radius: 20px;">
                <input type="text" placeholder="Nueva tarea pendiente...">
                <button class="btn-action" style="background: var(--accent); color: white;">Añadir Pendiente</button>
            </div>
        </div>

        <div id="notes" class="module">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Notas Personales</h2>
                <button onclick="lockAgain()" style="background:none; border:none; color:var(--accent); font-weight:bold;">BLOQUEAR</button>
            </div>
            <textarea id="notes-area" placeholder="Escribe tus secretos aquí..."></textarea>
        </div>
    </div>

    <script>
        const PIN_CORRECTO = "0000"; // Cambia este código si quieres
        let notesUnlocked = false;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
            toggleMenu();
        }

        function tryEnterNotes(element) {
            if (notesUnlocked) {
                switchTab('notes', element);
            } else {
                document.getElementById('pin-screen').style.display = 'flex';
                document.getElementById('pin-hidden').focus();
            }
        }

        function updateDots() {
            const val = document.getElementById('pin-hidden').value;
            const dots = document.querySelectorAll('.dot');
            
            dots.forEach((dot, i) => {
                if(i < val.length) dot.classList.add('filled');
                else dot.classList.remove('filled');
            });

            if(val.length === 4) {
                if(val === PIN_CORRECTO) {
                    notesUnlocked = true;
                    closePin();
                    switchTab('notes', document.querySelectorAll('.nav-item')[2]);
                } else {
                    alert("PIN Incorrecto");
                    document.getElementById('pin-hidden').value = "";
                    updateDots();
                }
            }
        }

        function closePin() {
            document.getElementById('pin-screen').style.display = 'none';
            document.getElementById('pin-hidden').value = "";
            updateDots();
        }

        function lockAgain() {
            notesUnlocked = false;
            switchTab('reminders', document.querySelectorAll('.nav-item')[0]);
        }
    </script>
</body>
</html>
