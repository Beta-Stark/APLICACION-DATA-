<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark Reminder Lite</title>
    <style>
        body { font-family: sans-serif; background: #141414; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #D1FFCC; cursor: pointer; font-weight: bold; }
        .card { background: #222; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 5px solid #D1FFCC; }
    </style>
</head>
<body>

<div class="container">
    <h1>Stark Reminder</h1>
    <input type="text" id="task-text" placeholder="Escribe tu recordatorio...">
    <select id="task-cat">
        <option value="Salud">Salud</option>
        <option value="Universidad">Universidad</option>
        <option value="Personal">Personal</option>
    </select>
    <button onclick="guardarTarea()">Guardar Recordatorio</button>
    
    <div id="lista-tareas"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-firestore-compat.js"></script>

<script>
    // Configuración extraída de tu proyecto
    const firebaseConfig = {
        apiKey: "AIzaSyDlmtpUfYjs33qa9tLE7Fv2C5yszSZEnUw",
        authDomain: "data-os-db30b.firebaseapp.com",
        projectId: "data-os-db30b",
        storageBucket: "data-os-db30b.firebasestorage.app",
        messagingSenderId: "149593183974",
        appId: "1:149593183974:web:e588fbee9a618e21980d27"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Función para guardar
    async function guardarTarea() {
        const text = document.getElementById('task-text').value;
        const cat = document.getElementById('task-cat').value;
        
        if(!text) return alert("Escribe algo primero");

        try {
            await db.collection("tareas").add({
                texto: text,
                categoria: cat,
                fecha: new Date()
            });
            document.getElementById('task-text').value = "";
            alert("Recordatorio guardado");
        } catch (e) {
            console.error("Error:", e);
        }
    }

    // Leer tareas en tiempo real
    db.collection("tareas").orderBy("fecha", "desc").onSnapshot(snapshot => {
        const lista = document.getElementById('lista-tareas');
        lista.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            lista.innerHTML += `
                <div class="card">
                    <strong>${data.categoria}</strong><br>
                    ${data.texto}
                </div>
            `;
        });
    });
</script>

</body>
</html>
