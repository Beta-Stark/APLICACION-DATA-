<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DATA - OS</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #8c9eff;
            --text: #ffffff;
            --high: #ff5252;
            --mid: #ffd740;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* Solo se ve UNA pantalla a la vez */
        .screen { display: none; padding: 25px; min-height: 100vh; }
        .screen.active { display: block !important; }

        /* --- LOGIN --- */
        #login-screen {
            background: linear-gradient(135deg, #05070a 0%, #161b2c 100%);
            flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center;
        }
        /* Ajuste para que el login sea flex cuando esté activo */
        #login-screen.active { display: flex !important; }

        .login-circle {
            width: 100px; height: 100px; background: var(--accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(140, 158, 255, 0.3); margin-bottom: 20px; font-size: 40px;
        }

        /* --- DASHBOARD --- */
        .header { margin: 20px 0 30px 0; }
        .header h1 { font-weight: 900; font-size: 2.8rem; letter-spacing: -1px; }
        .header p { opacity: 0.5; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }

        .mod-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 25px; border-radius: 25px; display: flex; align-items: center; gap: 20px;
            backdrop-filter: blur(10px); transition: 0.2s; cursor: pointer;
        }
        .mod-card:active { transform: scale(0.97); }
        .mod-card i { font-size: 30px; font-style: normal; }
        .mod-card div span { display: block; font-weight: 600; font-size: 1rem; }
        .mod-card div small { opacity: 0.5; font-size: 0.75rem; }

        .admin-style { background: var(--accent) !important; border: none; }
        .admin-style span, .admin-style small { color: #000 !important; }

        /* --- UI --- */
        input, textarea, select {
            width: 100%; padding: 18px; margin: 10px 0; border-radius: 15px;
            border: 1px solid var(--glass-border); background: var(--glass);
            color: white; font-size: 16px; outline: none;
        }
        .btn-main {
            width: 100%; padding: 18px; background: #ffffff; color: #000;
            border: none; border-radius: 15px; font-weight: 900; cursor: pointer; margin-top: 15px;
        }
        .back-nav { color: var(--accent); margin-bottom: 25px; cursor: pointer; display: block; font-weight: bold; }

        .rem-card {
            background: var(--glass); padding: 20px; border-radius: 20px; margin-bottom: 12px;
            border-left: 6px solid var(--accent); display: flex; justify-content: space-between; align-items: center;
        }
        .prio-high { border-left-color: var(--high); background: rgba(255, 82, 82, 0.05); }
        .prio-mid { border-left-color: var(--mid); background: rgba(255, 215, 64, 0.05); }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="login-circle">D</div>
        <h1 style="font-weight: 900; color: white;">DATA</h1>
        <p style="opacity: 0.4; font-size: 0.7rem; margin-bottom: 30px;">CENTRAL MANAGEMENT</p>
        <div style="width: 100%; max-width: 320px;">
            <input type="text" id="userInput" placeholder="Usuario">
            <input type="password" id="passInput" placeholder="Password">
            <button class="btn-main" onclick="accessApp()">Entrar</button>
        </div>
    </div>

    <div id="dashboard" class="screen">
        <div class="header">
            <p id="date-now">BIENVENIDO</p>
            <h1 id="user-title">USER</h1>
        </div>

        <div class="grid">
            <div id="admin-card" class="mod-card admin-style" style="display:none;" onclick="showModule('mod-admin')">
                <i>🛡️</i>
                <div><span>PANEL MAESTRO</span><small>Control total</small></div>
            </div>

            <div class="mod-card" onclick="showModule('mod-notes')">
                <i>📂</i>
                <div><span>Mis Datos</span><small>Enviar reportes</small></div>
            </div>

            <div class="mod-card" onclick="showModule('mod-reminders')">
                <i>🚨</i>
                <div><span>Recordatorios</span><small>Avisos del sistema</small></div>
            </div>
        </div>
        <p onclick="location.reload()" style="text-align:center; margin-top:50px; opacity:0.3; cursor:pointer;">CERRAR SESIÓN</p>
    </div>

    <div id="mod-notes" class="screen">
        <span class="back-nav" onclick="showModule('dashboard')">← VOLVER</span>
        <h2>Nuevo Reporte</h2>
        <input type="text" id="report-title" placeholder="Título">
        <textarea id="report-body" placeholder="Mensaje..." style="height: 200px;"></textarea>
        <button class="btn-main" onclick="sendReport()" style="background: var(--accent);">ENVIAR</button>
    </div>

    <div id="mod-reminders" class="screen">
        <span class="back-nav" onclick="showModule('dashboard')">← VOLVER</span>
        <h2>Alertas</h2>
        <div id="reminders-list"></div>
    </div>

    <div id="mod-admin" class="screen">
        <span class="back-nav" onclick="showModule('dashboard')">← VOLVER</span>
        <h2>Panel Maestro</h2>
        <div style="background: var(--glass); padding: 15px; border-radius: 20px; margin-bottom: 20px;">
            <input type="text" id="admin-rem-text" placeholder="Nuevo aviso global">
            <select id="admin-rem-prio">
                <option value="normal">Normal</option>
                <option value="mid">Media</option>
                <option value="high">Crítica</option>
            </select>
            <button class="btn-main" onclick="createReminder()">LANZAR AVISO</button>
        </div>
        <div id="admin-reports-list"></div>
    </div>

    <script>
        // FIREBASE (Datos de tu imagen)
        const firebaseConfig = {
            apiKey: "AIzaSyCi_lO7_SUp9X5-Vq_Fm_7yW77v7p_8",
            authDomain: "data-40f4e.firebaseapp.com",
            projectId: "data-40f4e",
            storageBucket: "data-40f4e.appspot.com",
            messagingSenderId: "135086884323",
            appId: "1:135086884323:web:0d5883652671569426f8d1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentUser = "";

        // FUNCIÓN PARA CAMBIAR DE PANTALLA SIN REPETICIONES
        function showModule(targetId) {
            // Ocultar todas las pantallas
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
            });
            // Mostrar solo la elegida
            document.getElementById(targetId).classList.add('active');
        }

        function accessApp() {
            const u = document.getElementById('userInput').value.trim().toLowerCase();
            const p = document.getElementById('passInput').value.trim();

            if (p === "1234") {
                currentUser = u;
                // Mostrar Dashboard directamente
                showModule('dashboard');
                document.getElementById('user-title').innerText = u.toUpperCase();
                
                if(u === 'admin') {
                    document.getElementById('admin-card').style.display = 'flex';
                }
                loadData();
            } else {
                alert("Contraseña incorrecta");
            }
        }

        // FIREBASE OPS
        function sendReport() {
            const t = document.getElementById('report-title').value;
            const b = document.getElementById('report-body').value;
            if(!t || !b) return alert("Completa los campos");
            db.collection("reports").add({ user: currentUser, title: t, body: b, date: new Date() })
            .then(() => { alert("Enviado"); showModule('dashboard'); });
        }

        function createReminder() {
            const txt = document.getElementById('admin-rem-text').value;
            const prio = document.getElementById('admin-rem-prio').value;
            db.collection("reminders").add({ text: txt, priority: prio, date: new Date() })
            .then(() => { alert("Aviso lanzado"); document.getElementById('admin-rem-text').value = ""; });
        }

        function loadData() {
            db.collection("reminders").orderBy("date", "desc").onSnapshot(snap => {
                const list = document.getElementById('reminders-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const pClass = d.priority === 'high' ? 'prio-high' : (d.priority === 'mid' ? 'prio-mid' : '');
                    list.innerHTML += `<div class="rem-card ${pClass}"><span>${d.text}</span></div>`;
                });
            });

            db.collection("reports").orderBy("date", "desc").onSnapshot(snap => {
                const list = document.getElementById('admin-reports-list');
                if(!list) return;
                list.innerHTML = "";
                snap.forEach(doc => {
                    const r = doc.data();
                    list.innerHTML += `<div class="mod-card" style="margin-bottom:10px;"><div><small>De: ${r.user}</small><br><strong>${r.title}</strong><p>${r.body}</p></div></div>`;
                });
            });
        }
    </script>
</body>
</html>
