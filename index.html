<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA OS - Emergency Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F7EFE2; --surface: #FFFFFF; --header: #2A3A4A; --accent: #BBCBBD; --danger: #EF4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); padding-bottom: 100px; }
        .system-bar { background: var(--surface); padding: 15px; display: none; justify-content: space-between; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .screen { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; }
        #login-screen.active { display: flex !important; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        /* TARJETAS */
        .mod-card { background: var(--accent); padding: 20px; border-radius: 25px; margin-bottom: 20px; }
        .data-item { 
            background: white !important; color: #2A3A4A !important; 
            padding: 15px; border-radius: 15px; margin-bottom: 10px; 
            position: relative; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .delete-btn { position: absolute; right: 10px; top: 10px; color: var(--danger); font-weight: 900; cursor: pointer; }

        .pwa-nav { background: white; position: fixed; bottom: 0; width: 100%; display: none; justify-content: space-around; padding: 15px; border-top: 1px solid #ddd; z-index: 1000; }
        input, textarea { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin: 10px 0; font-size: 1rem; }
        .btn-main { width: 100%; padding: 15px; background: var(--header); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div class="system-bar" id="sys-bar">
        <div style="font-weight:900;">DATA OS</div>
        <div id="role-display" style="background:#000; color:#fff; padding:2px 10px; border-radius:10px; font-size:0.7rem;">ADMIN</div>
    </div>

    <div id="login-screen" class="screen active">
        <h1 style="font-size: 3rem; font-weight: 900;">DATA OS</h1>
        <input type="text" id="userInput" placeholder="Usuario">
        <input type="password" id="passInput" placeholder="PIN">
        <button class="btn-main" onclick="handleLogin()">INICIAR</button>
    </div>

    <div id="dashboard" class="screen">
        <h2 id="welcome-msg">Hola</h2>
        <div class="mod-card">
            <h3>📝 RECORDATORIOS</h3>
            <div id="notes-list" style="margin-top:15px;">Esperando datos de la nube...</div>
        </div>
        <button class="btn-main" onclick="navTo('add-screen')">AÑADIR NUEVA NOTA</button>
    </div>

    <div id="add-screen" class="screen">
        <h2>Nueva Nota</h2>
        <textarea id="note-text" placeholder="Escribe aquí..."></textarea>
        <button class="btn-main" id="btnSave">GUARDAR EN CLOUD</button>
    </div>

    <nav class="pwa-nav" id="pwa-nav">
        <div onclick="navTo('dashboard')">🏠 Inicio</div>
        <div onclick="navTo('add-screen')">📝 Notas</div>
        <div onclick="location.reload()">✕ Salir</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, doc, onSnapshot, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDlmtpUfYjs33qa9tLE7Fv2C5yszSZEnUw",
            authDomain: "data-os-db30b.firebaseapp.com",
            projectId: "data-os-db30b",
            storageBucket: "data-os-db30b.firebasestorage.app",
            messagingSenderId: "149593183974",
            appId: "1:149593183974:web:e588fbee9a618e21980d27"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LOGIN SIN FILTROS COMPLEJOS
        window.handleLogin = async () => {
            const u = document.getElementById('userInput').value.trim();
            if(!u || document.getElementById('passInput').value !== "1234") return alert("PIN incorrecto");

            const userSnap = await getDoc(doc(db, "usuarios_autorizados", u));
            if(userSnap.exists()){
                window.currentUser = u;
                document.getElementById('welcome-msg').innerText = "Hola, " + u;
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('dashboard').classList.add('active');
                document.getElementById('sys-bar').style.display = 'flex';
                document.getElementById('pwa-nav').style.display = 'flex';
                
                // CARGAR DATOS
                const q = query(collection(db, "recordatorios"), where("usuario", "==", u));
                onSnapshot(q, (snap) => {
                    let html = "";
                    snap.forEach(d => {
                        html += `<div class="data-item">
                            <span class="delete-btn" onclick="borrarNota('${d.id}')">✕</span>
                            ${d.data().texto}
                        </div>`;
                    });
                    document.getElementById('notes-list').innerHTML = html || "No tienes notas aún.";
                });
            } else { alert("Usuario no registrado"); }
        };

        window.borrarNota = async (id) => {
            if(confirm("¿Borrar?")) await deleteDoc(doc(db, "recordatorios", id));
        };

        document.getElementById('btnSave').onclick = async () => {
            const txt = document.getElementById('note-text').value;
            if(!txt) return;
            await addDoc(collection(db, "recordatorios"), { usuario: window.currentUser, texto: txt });
            document.getElementById('note-text').value = "";
            navTo('dashboard');
        };
    </script>

    <script>
        function navTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
