<style>
    .rem-card {
        background: var(--glass);
        padding: 15px;
        border-radius: 18px;
        margin-bottom: 10px;
        border-left: 5px solid var(--accent);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .prio-high { border-left-color: #ff5252; background: rgba(255, 82, 82, 0.1); }
    .prio-mid { border-left-color: #ffd740; background: rgba(255, 215, 64, 0.1); }
    
    .status-badge {
        font-size: 0.6rem;
        padding: 4px 8px;
        border-radius: 10px;
        background: var(--accent);
        color: #000;
        font-weight: bold;
    }
</style>

<div id="mod-reminders" class="screen">
    <span class="back-nav" onclick="goHome()">← VOLVER</span>
    <h2 style="margin-bottom: 20px;">Recordatorios</h2>
    
    <div class="rem-card prio-high">
        <div>
            <span style="display:block; font-weight:bold;">🚨 REVISAR TEMA 5</span>
            <small style="opacity:0.6;">Vence en: 2 horas</small>
        </div>
        <div class="status-badge">PENDIENTE</div>
    </div>

    <div class="rem-card prio-mid">
        <div>
            <span style="display:block; font-weight:bold;">📝 Subir resumen semanal</span>
            <small style="opacity:0.6;">Asignado por: Admin</small>
        </div>
        <button onclick="this.innerText='✅ LEÍDO'" style="background:var(--accent); border:none; padding:5px 10px; border-radius:10px; font-size:0.6rem; font-weight:bold;">CONFIRMAR</button>
    </div>
</div>
