<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark Reminder</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #141414; --accent: #D1FFCC; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #222; padding: 15px; }
        button { background: var(--accent); border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="dashboard" class="screen active">
        <h1>Mis Recordatorios</h1>
        <div id="tasks-container"></div>
    </div>

    <div id="add-task" class="screen">
        <h1>Nuevo Recordatorio</h1>
        <input type="text" id="task-title" placeholder="¿Qué debes hacer?"><br><br>
        <select id="task-cat">
            <option>Salud</option>
            <option>Universidad</option>
            <option>Personal</option>
        </select><br><br>
        <button onclick="saveTask()">Guardar Tarea</button>
        <button onclick="askGemini()">Preguntar a Gemini</button>
        <p id="ai-response"></p>
    </div>

    <nav>
        <button onclick="navTo('dashboard')">🏠</button>
        <button onclick="navTo('add-task')">+</button>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
